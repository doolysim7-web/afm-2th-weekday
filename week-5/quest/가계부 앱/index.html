<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💰 나의 가계부</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 24px;
      font-size: 2rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: #4a5568;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
    }
    /* Summary */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .summary-box {
      padding: 16px;
      border-radius: 8px;
      text-align: center;
    }
    .summary-box .label {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 4px;
    }
    .summary-box .value {
      font-size: 1.4rem;
      font-weight: 700;
    }
    .summary-income { background: #e6fffa; }
    .summary-income .value { color: #2f855a; }
    .summary-expense { background: #fff5f5; }
    .summary-expense .value { color: #c53030; }
    .summary-balance { background: #ebf4ff; }
    .summary-balance .value { color: #2b6cb0; }
    .category-list {
      list-style: none;
    }
    .category-list li {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #edf2f7;
    }
    .category-list li:last-child { border-bottom: none; }
    .cat-name {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cat-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .badge-income { background: #c6f6d5; color: #22543d; }
    .badge-expense { background: #fed7d7; color: #742a2a; }
    /* Form */
    form {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .form-row { grid-column: span 2; }
    label {
      display: block;
      font-size: 0.85rem;
      color: #4a5568;
      margin-bottom: 4px;
      font-weight: 600;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }
    textarea { resize: vertical; min-height: 60px; }
    .type-toggle {
      display: flex;
      gap: 8px;
    }
    .type-toggle button {
      flex: 1;
      padding: 10px;
      border: 2px solid #cbd5e0;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s;
    }
    .type-toggle button.active[data-type="income"] {
      background: #48bb78;
      color: white;
      border-color: #48bb78;
    }
    .type-toggle button.active[data-type="expense"] {
      background: #f56565;
      color: white;
      border-color: #f56565;
    }
    .submit-btn {
      grid-column: span 2;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: #5a67d8; }
    .submit-btn:disabled { background: #a0aec0; cursor: not-allowed; }
    .category-row {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }
    .category-row select { flex: 1; }
    .icon-btn {
      width: 40px;
      border: 1px solid #cbd5e0;
      background: #f7fafc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 700;
      color: #4a5568;
      transition: all 0.15s;
    }
    .icon-btn:hover { background: #edf2f7; border-color: #a0aec0; }
    .icon-btn.danger { color: #c53030; }
    .icon-btn.danger:hover { background: #fff5f5; border-color: #fc8181; }
    .new-cat-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .new-cat-row input { flex: 1; }
    .new-cat-row button {
      padding: 0 14px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    .new-cat-row button:hover { background: #5a67d8; }
    .new-cat-row button.ghost {
      background: #e2e8f0;
      color: #4a5568;
    }
    .new-cat-row button.ghost:hover { background: #cbd5e0; }
    /* List */
    .tx-item {
      display: grid;
      grid-template-columns: 90px 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #edf2f7;
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-date {
      font-size: 0.85rem;
      color: #718096;
    }
    .tx-info .category {
      font-weight: 600;
      margin-bottom: 2px;
    }
    .tx-info .memo {
      font-size: 0.85rem;
      color: #718096;
    }
    .tx-amount {
      font-weight: 700;
      font-size: 1.05rem;
    }
    .tx-amount.income { color: #2f855a; }
    .tx-amount.expense { color: #c53030; }
    .delete-btn {
      padding: 6px 12px;
      background: #fed7d7;
      color: #c53030;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .delete-btn:hover { background: #feb2b2; }
    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 24px;
      font-size: 0.95rem;
    }
    @media (max-width: 640px) {
      .summary-grid { grid-template-columns: 1fr; }
      form { grid-template-columns: 1fr; }
      .form-row { grid-column: span 1; }
      .submit-btn { grid-column: span 1; }
      .tx-item { grid-template-columns: 1fr auto; gap: 4px; }
      .tx-date { grid-column: span 2; }
      .tx-info { grid-column: 1; }
      .tx-amount { grid-column: 2; grid-row: 2; }
      .delete-btn { grid-column: 2; grid-row: 3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💰 나의 가계부</h1>

    <div class="card">
      <h2>📊 요약</h2>
      <div class="summary-grid">
        <div class="summary-box summary-income">
          <div class="label">총 수입</div>
          <div class="value" id="totalIncome">0원</div>
        </div>
        <div class="summary-box summary-expense">
          <div class="label">총 지출</div>
          <div class="value" id="totalExpense">0원</div>
        </div>
        <div class="summary-box summary-balance">
          <div class="label">잔액</div>
          <div class="value" id="balance">0원</div>
        </div>
      </div>
      <h2 style="margin-top:16px;">카테고리별 합계</h2>
      <ul class="category-list" id="categoryList">
        <li class="empty">내역을 추가하면 표시됩니다.</li>
      </ul>
    </div>

    <div class="card">
      <h2>✏️ 새 내역 등록</h2>
      <form id="txForm">
        <div class="form-row">
          <label>구분</label>
          <div class="type-toggle">
            <button type="button" data-type="expense" class="active">지출</button>
            <button type="button" data-type="income">수입</button>
          </div>
        </div>
        <div>
          <label for="date">날짜</label>
          <input type="date" id="date" required />
        </div>
        <div>
          <label for="amount">금액 (원)</label>
          <input type="number" id="amount" min="0" step="1" required placeholder="0" />
        </div>
        <div class="form-row">
          <label for="category">카테고리</label>
          <div class="category-row">
            <select id="category" required></select>
            <button type="button" id="addCategoryBtn" class="icon-btn" title="카테고리 추가">＋</button>
            <button type="button" id="removeCategoryBtn" class="icon-btn danger" title="선택 카테고리 삭제">－</button>
          </div>
          <div id="newCategoryRow" class="new-cat-row" hidden>
            <input type="text" id="newCategoryInput" placeholder="새 카테고리명 (예: 반려동물)" maxlength="20" />
            <button type="button" id="confirmCategoryBtn">추가</button>
            <button type="button" id="cancelCategoryBtn" class="ghost">취소</button>
          </div>
        </div>
        <div class="form-row">
          <label for="memo">메모 (선택)</label>
          <textarea id="memo" placeholder="예: 점심 김치찌개"></textarea>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">등록하기</button>
      </form>
    </div>

    <div class="card">
      <h2>📒 거래 내역</h2>
      <div id="txList">
        <div class="empty">등록된 내역이 없습니다.</div>
      </div>
    </div>
  </div>
  <script src="client.js"></script>
</body>
</html>
