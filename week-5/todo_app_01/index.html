<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .todo-enter { animation: slideIn 0.2s ease-out; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext } = React;

    const API = '/api';

    // ========================================
    // Auth Context
    // ========================================
    const AuthContext = createContext(null);

    function useAuth() {
      return useContext(AuthContext);
    }

    function authHeaders(token) {
      return { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` };
    }

    // ========================================
    // Auth Pages
    // ========================================
    function LoginPage({ onSwitch }) {
      const { login } = useAuth();
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const res = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          const json = await res.json();
          if (json.success) {
            login(json.data.token, json.data.user);
          } else {
            setError(json.message);
          }
        } catch {
          setError('서버에 연결할 수 없습니다');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-sm mx-auto px-4 py-20">
          <h1 className="text-2xl font-semibold text-gray-800 mb-2 tracking-tight">로그인</h1>
          <p className="text-sm text-gray-400 mb-8">할 일 목록에 접속하세요</p>

          {error && (
            <div className="mb-4 px-4 py-2.5 bg-red-50 border border-red-100 rounded-lg text-sm text-red-600">
              {error}
            </div>
          )}

          <form onSubmit={handleSubmit} className="space-y-4">
            <input
              type="email" value={email} onChange={e => setEmail(e.target.value)}
              placeholder="이메일" required
              className="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-white text-sm
                         focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent
                         placeholder:text-gray-400"
            />
            <input
              type="password" value={password} onChange={e => setPassword(e.target.value)}
              placeholder="비밀번호" required
              className="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-white text-sm
                         focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent
                         placeholder:text-gray-400"
            />
            <button
              type="submit" disabled={loading}
              className="w-full py-2.5 bg-gray-900 text-white text-sm font-medium rounded-lg
                         hover:bg-gray-800 disabled:opacity-50 transition-colors"
            >
              {loading ? '로그인 중...' : '로그인'}
            </button>
          </form>

          <p className="mt-6 text-center text-sm text-gray-400">
            계정이 없으신가요?{' '}
            <button onClick={onSwitch} className="text-gray-900 font-medium hover:underline">
              회원가입
            </button>
          </p>
        </div>
      );
    }

    function SignupPage({ onSwitch }) {
      const { login } = useAuth();
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [nickname, setNickname] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const res = await fetch(`${API}/auth/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, nickname }),
          });
          const json = await res.json();
          if (json.success) {
            login(json.data.token, json.data.user);
          } else {
            setError(json.message);
          }
        } catch {
          setError('서버에 연결할 수 없습니다');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-sm mx-auto px-4 py-20">
          <h1 className="text-2xl font-semibold text-gray-800 mb-2 tracking-tight">회원가입</h1>
          <p className="text-sm text-gray-400 mb-8">새 계정을 만드세요</p>

          {error && (
            <div className="mb-4 px-4 py-2.5 bg-red-50 border border-red-100 rounded-lg text-sm text-red-600">
              {error}
            </div>
          )}

          <form onSubmit={handleSubmit} className="space-y-4">
            <input
              type="text" value={nickname} onChange={e => setNickname(e.target.value)}
              placeholder="닉네임" required
              className="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-white text-sm
                         focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent
                         placeholder:text-gray-400"
            />
            <input
              type="email" value={email} onChange={e => setEmail(e.target.value)}
              placeholder="이메일" required
              className="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-white text-sm
                         focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent
                         placeholder:text-gray-400"
            />
            <input
              type="password" value={password} onChange={e => setPassword(e.target.value)}
              placeholder="비밀번호 (6자 이상)" required minLength={6}
              className="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-white text-sm
                         focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent
                         placeholder:text-gray-400"
            />
            <button
              type="submit" disabled={loading}
              className="w-full py-2.5 bg-gray-900 text-white text-sm font-medium rounded-lg
                         hover:bg-gray-800 disabled:opacity-50 transition-colors"
            >
              {loading ? '가입 중...' : '회원가입'}
            </button>
          </form>

          <p className="mt-6 text-center text-sm text-gray-400">
            이미 계정이 있으신가요?{' '}
            <button onClick={onSwitch} className="text-gray-900 font-medium hover:underline">
              로그인
            </button>
          </p>
        </div>
      );
    }

    // ========================================
    // Admin Panel
    // ========================================
    function AdminPanel({ onBack }) {
      const { token } = useAuth();
      const [tab, setTab] = useState('users');
      const [users, setUsers] = useState([]);
      const [todos, setTodos] = useState([]);
      const [loading, setLoading] = useState(true);

      const headers = authHeaders(token);

      const fetchUsers = async () => {
        try {
          const res = await fetch(`${API}/admin/users`, { headers });
          const json = await res.json();
          if (json.success) setUsers(json.data);
        } catch (err) { console.error(err); }
      };

      const fetchTodos = async () => {
        try {
          const res = await fetch(`${API}/admin/todos`, { headers });
          const json = await res.json();
          if (json.success) setTodos(json.data);
        } catch (err) { console.error(err); }
      };

      useEffect(() => {
        Promise.all([fetchUsers(), fetchTodos()]).then(() => setLoading(false));
      }, []);

      const deleteUser = async (id, email) => {
        if (!confirm(`정말 "${email}" 유저를 삭제하시겠습니까?\n해당 유저의 모든 할 일도 삭제됩니다.`)) return;
        try {
          const res = await fetch(`${API}/admin/users/${id}`, { method: 'DELETE', headers });
          const json = await res.json();
          if (json.success) {
            setUsers(prev => prev.filter(u => u.id !== id));
            setTodos(prev => prev.filter(t => t.user_id !== id));
          } else {
            alert(json.message);
          }
        } catch (err) { console.error(err); }
      };

      const deleteTodo = async (id) => {
        if (!confirm('이 할 일을 삭제하시겠습니까?')) return;
        try {
          const res = await fetch(`${API}/admin/todos/${id}`, { method: 'DELETE', headers });
          const json = await res.json();
          if (json.success) setTodos(prev => prev.filter(t => t.id !== id));
        } catch (err) { console.error(err); }
      };

      if (loading) {
        return <p className="text-center text-gray-400 text-sm py-16">불러오는 중...</p>;
      }

      return (
        <div className="max-w-3xl mx-auto px-4 py-10 sm:py-16">
          <div className="flex items-center justify-between mb-8">
            <div>
              <h1 className="text-2xl font-semibold text-gray-800 tracking-tight">관리자 패널</h1>
              <p className="text-sm text-gray-400 mt-1">유저 {users.length}명 / 할 일 {todos.length}개</p>
            </div>
            <button
              onClick={onBack}
              className="text-xs text-gray-400 hover:text-gray-600 transition-colors px-3 py-1.5
                         border border-gray-200 rounded-md hover:border-gray-300"
            >
              내 할 일로
            </button>
          </div>

          {/* Tabs */}
          <div className="flex gap-1 mb-6 text-sm">
            {[
              { key: 'users', label: `유저 (${users.length})` },
              { key: 'todos', label: `전체 할 일 (${todos.length})` },
            ].map(t => (
              <button
                key={t.key}
                onClick={() => setTab(t.key)}
                className={`px-3 py-1.5 rounded-md transition-colors ${
                  tab === t.key
                    ? 'bg-gray-900 text-white'
                    : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'
                }`}
              >
                {t.label}
              </button>
            ))}
          </div>

          {/* Users Tab */}
          {tab === 'users' && (
            <div className="space-y-2">
              {users.map(u => (
                <div key={u.id} className="flex items-center gap-3 px-4 py-3 bg-white rounded-lg border border-gray-100">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <span className="text-sm font-medium text-gray-800 truncate">{u.nickname}</span>
                      {u.role === 'admin' && (
                        <span className="text-[10px] px-1.5 py-0.5 bg-red-100 text-red-600 rounded font-medium">ADMIN</span>
                      )}
                    </div>
                    <p className="text-xs text-gray-400 truncate">{u.email}</p>
                    <p className="text-xs text-gray-400">할 일 {u.todo_count}개 / 가입: {new Date(u.created_at).toLocaleDateString('ko-KR')}</p>
                  </div>
                  {u.role !== 'admin' && (
                    <button
                      onClick={() => deleteUser(u.id, u.email)}
                      className="shrink-0 text-xs text-gray-400 hover:text-red-500 transition-colors
                                 px-2 py-1 border border-gray-200 rounded hover:border-red-200"
                    >
                      삭제
                    </button>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* Todos Tab */}
          {tab === 'todos' && (
            <div className="space-y-1.5">
              {todos.map(t => (
                <div key={t.id} className="group flex items-center gap-3 px-4 py-3 bg-white rounded-lg border border-gray-100">
                  <div className={`shrink-0 w-5 h-5 rounded-full border-2 flex items-center justify-center ${
                    t.done ? 'bg-gray-900 border-gray-900' : 'border-gray-300'
                  }`}>
                    {t.done && (
                      <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                      </svg>
                    )}
                  </div>
                  <div className="flex-1 min-w-0">
                    <span className={`text-sm break-all ${t.done ? 'line-through text-gray-400' : 'text-gray-700'}`}>
                      {t.text}
                    </span>
                    <p className="text-xs text-gray-400">{t.user_nickname} ({t.user_email})</p>
                  </div>
                  <button
                    onClick={() => deleteTodo(t.id)}
                    className="shrink-0 opacity-0 group-hover:opacity-100 p-1 text-gray-400
                               hover:text-red-500 transition-all"
                  >
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                  </button>
                </div>
              ))}
              {todos.length === 0 && (
                <p className="text-center text-gray-400 text-sm py-12">등록된 할 일이 없습니다</p>
              )}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Todo Page
    // ========================================
    function TodoPage() {
      const { user, token, logout } = useAuth();
      const [todos, setTodos] = useState([]);
      const [text, setText] = useState('');
      const [filter, setFilter] = useState('all');
      const [loading, setLoading] = useState(true);
      const [showAdmin, setShowAdmin] = useState(false);
      const inputRef = useRef(null);

      const headers = authHeaders(token);

      const fetchTodos = async () => {
        try {
          const res = await fetch(`${API}/todos`, { headers });
          const json = await res.json();
          if (json.success) setTodos(json.data);
        } catch (err) {
          console.error('Failed to fetch todos:', err);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => { fetchTodos(); }, []);

      const addTodo = async (e) => {
        e.preventDefault();
        const trimmed = text.trim();
        if (!trimmed) return;
        try {
          const res = await fetch(`${API}/todos`, {
            method: 'POST', headers,
            body: JSON.stringify({ text: trimmed }),
          });
          const json = await res.json();
          if (json.success) setTodos(prev => [json.data, ...prev]);
        } catch (err) {
          console.error('Failed to add todo:', err);
        }
        setText('');
        inputRef.current?.focus();
      };

      const toggleTodo = async (id) => {
        try {
          const res = await fetch(`${API}/todos/${id}`, {
            method: 'PATCH', headers,
            body: JSON.stringify({}),
          });
          const json = await res.json();
          if (json.success) {
            setTodos(prev => prev.map(t => t.id === id ? json.data : t));
          }
        } catch (err) {
          console.error('Failed to toggle todo:', err);
        }
      };

      const deleteTodo = async (id) => {
        try {
          await fetch(`${API}/todos/${id}`, { method: 'DELETE', headers });
          setTodos(prev => prev.filter(t => t.id !== id));
        } catch (err) {
          console.error('Failed to delete todo:', err);
        }
      };

      const clearCompleted = async () => {
        try {
          await fetch(`${API}/todos/completed`, { method: 'DELETE', headers });
          setTodos(prev => prev.filter(t => !t.done));
        } catch (err) {
          console.error('Failed to clear completed:', err);
        }
      };

      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      const doneCount = todos.filter(t => t.done).length;
      const activeCount = todos.length - doneCount;

      if (showAdmin && user.role === 'admin') {
        return <AdminPanel onBack={() => setShowAdmin(false)} />;
      }

      return (
        <div className="max-w-lg mx-auto px-4 py-10 sm:py-16">
          {/* Header */}
          <div className="flex items-center justify-between mb-8">
            <div>
              <h1 className="text-2xl font-semibold text-gray-800 tracking-tight">할 일 목록</h1>
              <p className="text-sm text-gray-400 mt-1">{user.nickname}님</p>
            </div>
            <div className="flex gap-2">
              {user.role === 'admin' && (
                <button
                  onClick={() => setShowAdmin(true)}
                  className="text-xs text-red-500 hover:text-red-600 transition-colors px-3 py-1.5
                             border border-red-200 rounded-md hover:border-red-300"
                >
                  관리자
                </button>
              )}
              <button
                onClick={logout}
                className="text-xs text-gray-400 hover:text-gray-600 transition-colors px-3 py-1.5
                           border border-gray-200 rounded-md hover:border-gray-300"
              >
                로그아웃
              </button>
            </div>
          </div>

          {/* Input */}
          <form onSubmit={addTodo} className="flex gap-2 mb-6">
            <input
              ref={inputRef}
              type="text"
              value={text}
              onChange={e => setText(e.target.value)}
              placeholder="할 일을 입력하세요"
              className="flex-1 px-4 py-2.5 rounded-lg border border-gray-200 bg-white text-sm
                         focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent
                         placeholder:text-gray-400 transition-shadow"
              aria-label="새 할 일"
            />
            <button
              type="submit"
              disabled={!text.trim()}
              className="px-5 py-2.5 bg-gray-900 text-white text-sm font-medium rounded-lg
                         hover:bg-gray-800 disabled:opacity-30 disabled:cursor-not-allowed
                         transition-colors shrink-0"
            >
              추가
            </button>
          </form>

          {/* Filter Tabs */}
          {todos.length > 0 && (
            <div className="flex gap-1 mb-4 text-sm">
              {[
                { key: 'all', label: `전체 (${todos.length})` },
                { key: 'active', label: `진행 (${activeCount})` },
                { key: 'done', label: `완료 (${doneCount})` },
              ].map(f => (
                <button
                  key={f.key}
                  onClick={() => setFilter(f.key)}
                  className={`px-3 py-1.5 rounded-md transition-colors ${
                    filter === f.key
                      ? 'bg-gray-900 text-white'
                      : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'
                  }`}
                >
                  {f.label}
                </button>
              ))}
            </div>
          )}

          {/* Loading State */}
          {loading && (
            <p className="text-center text-gray-400 text-sm py-16">불러오는 중...</p>
          )}

          {/* Todo List */}
          <ul className="space-y-1.5">
            {filtered.map(todo => (
              <li
                key={todo.id}
                className="todo-enter group flex items-center gap-3 px-4 py-3 bg-white rounded-lg
                           border border-gray-100 hover:border-gray-200 transition-colors"
              >
                <button
                  onClick={() => toggleTodo(todo.id)}
                  className={`shrink-0 w-5 h-5 rounded-full border-2 flex items-center justify-center
                             transition-colors ${
                    todo.done
                      ? 'bg-gray-900 border-gray-900'
                      : 'border-gray-300 hover:border-gray-400'
                  }`}
                  aria-label={todo.done ? '완료 취소' : '완료 처리'}
                >
                  {todo.done && (
                    <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                  )}
                </button>

                <span className={`flex-1 text-sm leading-relaxed break-all ${
                  todo.done ? 'line-through text-gray-400' : 'text-gray-700'
                }`}>
                  {todo.text}
                </span>

                <button
                  onClick={() => deleteTodo(todo.id)}
                  className="shrink-0 opacity-0 group-hover:opacity-100 p-1 text-gray-400
                             hover:text-red-500 transition-all"
                  aria-label="삭제"
                >
                  <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </li>
            ))}
          </ul>

          {/* Empty State */}
          {!loading && todos.length === 0 && (
            <p className="text-center text-gray-400 text-sm py-16">
              할 일을 추가해 보세요
            </p>
          )}
          {todos.length > 0 && filtered.length === 0 && (
            <p className="text-center text-gray-400 text-sm py-12">
              {filter === 'active' ? '진행 중인 할 일이 없습니다' : '완료된 할 일이 없습니다'}
            </p>
          )}

          {/* Footer */}
          {doneCount > 0 && (
            <div className="mt-6 text-right">
              <button
                onClick={clearCompleted}
                className="text-xs text-gray-400 hover:text-red-500 transition-colors"
              >
                완료 항목 삭제
              </button>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // App Component (Auth Provider)
    // ========================================
    function App() {
      const [token, setToken] = useState(() => localStorage.getItem('todo_token'));
      const [user, setUser] = useState(() => {
        try { return JSON.parse(localStorage.getItem('todo_user')); } catch { return null; }
      });
      const [page, setPage] = useState('login');
      const [checking, setChecking] = useState(!!token);

      // Verify token on mount
      useEffect(() => {
        if (!token) { setChecking(false); return; }
        fetch(`${API}/auth/me`, { headers: authHeaders(token) })
          .then(r => r.json())
          .then(json => {
            if (!json.success) { logout(); }
          })
          .catch(() => { logout(); })
          .finally(() => setChecking(false));
      }, []);

      const login = (newToken, newUser) => {
        setToken(newToken);
        setUser(newUser);
        localStorage.setItem('todo_token', newToken);
        localStorage.setItem('todo_user', JSON.stringify(newUser));
      };

      const logout = () => {
        setToken(null);
        setUser(null);
        localStorage.removeItem('todo_token');
        localStorage.removeItem('todo_user');
      };

      if (checking) {
        return (
          <div className="flex items-center justify-center min-h-screen">
            <p className="text-gray-400 text-sm">로딩 중...</p>
          </div>
        );
      }

      return (
        <AuthContext.Provider value={{ token, user, login, logout }}>
          {token && user ? (
            <TodoPage />
          ) : page === 'login' ? (
            <LoginPage onSwitch={() => setPage('signup')} />
          ) : (
            <SignupPage onSwitch={() => setPage('login')} />
          )}
        </AuthContext.Provider>
      );
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
