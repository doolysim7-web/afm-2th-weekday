    // 🔀 Router (Hash-based)

    const RouterContext = createContext(null);

    function useHashLocation() {
      const get = () => {
        const h = window.location.hash || "#/";
        return h.startsWith("#") ? h.slice(1) : h;
      };
      const [path, setPath] = useState(get());
      useEffect(() => {
        const onHash = () => setPath(get());
        window.addEventListener("hashchange", onHash);
        return () => window.removeEventListener("hashchange", onHash);
      }, []);
      return path || "/";
    }

    function matchRoute(pattern, path) {
      const pSeg = pattern.split("/").filter(Boolean);
      const tSeg = path.split("/").filter(Boolean);
      if (pSeg.length !== tSeg.length) return null;
      const params = {};
      for (let i = 0; i < pSeg.length; i++) {
        if (pSeg[i].startsWith(":")) {
          params[pSeg[i].slice(1)] = decodeURIComponent(tSeg[i]);
        } else if (pSeg[i] !== tSeg[i]) {
          return null;
        }
      }
      return { params };
    }

    function Router({ children }) {
      const path = useHashLocation();
      const navigate = useCallback((to) => {
        const target = to.startsWith("#") ? to : ("#" + to);
        if (window.location.hash !== target) window.location.hash = target;
        else window.dispatchEvent(new HashChangeEvent("hashchange"));
        // scroll to top on nav
        window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
      }, []);
      return (
        <RouterContext.Provider value={{ path, navigate }}>
          {children}
        </RouterContext.Provider>
      );
    }

    function useRouter() { return useContext(RouterContext); }

    function Routes({ children }) {
      const { path } = useRouter();
      const arr = React.Children.toArray(children);
      for (const child of arr) {
        const m = matchRoute(child.props.path, path);
        if (m) {
          return <ParamsContext.Provider value={m.params}>{child.props.element}</ParamsContext.Provider>;
        }
      }
      // fallback
      const fallback = arr.find(c => c.props.path === "*");
      return fallback ? fallback.props.element : null;
    }

    function Route({ path, element }) { return null; }

    const ParamsContext = createContext({});
    function useParams() { return useContext(ParamsContext); }

    function Link({ to, className = "", children, onClick, ...rest }) {
      const { navigate } = useRouter();
      const handle = (e) => {
        e.preventDefault();
        if (onClick) onClick(e);
        navigate(to);
      };
      return (
        <a href={"#" + to} onClick={handle} className={className} {...rest}>{children}</a>
      );
    }

    // ========================================
    // 🎨 Design System
    // ========================================
    function Button({
      variant = "primary",
      size = "md",
      disabled = false,
      type = "button",
      onClick,
      className = "",
      children,
      ...rest
    }) {
      const base = "inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-offset-zinc-950 disabled:opacity-50 disabled:cursor-not-allowed";
      const sizes = {
        sm: "px-3 py-1.5 text-sm",
        md: "px-4 py-2.5 text-sm",
        lg: "px-6 py-3.5 text-base"
      };
      const variants = {
        primary: "text-white grad-bg shadow-lg shadow-fuchsia-500/20 hover:shadow-fuchsia-500/40 hover:brightness-110 focus-visible:ring-fuchsia-400",
        secondary: "bg-zinc-800/80 text-zinc-100 border border-zinc-700 hover:bg-zinc-700 hover:border-zinc-600 focus-visible:ring-zinc-400",
        danger: "bg-red-600 text-white hover:bg-red-500 focus-visible:ring-red-400",
        ghost: "bg-transparent text-zinc-300 hover:bg-zinc-800/70 hover:text-white focus-visible:ring-zinc-500"
      };
      return (
        <button
          type={type}
          disabled={disabled}
          onClick={onClick}
          className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Input({
      type = "text",
      label,
      value,
      onChange,
      placeholder,
      error,
      disabled,
      id,
      inputMode,
      maxLength,
      autoComplete,
      className = "",
      ...rest
    }) {
      const inputId = id || `input-${Math.random().toString(36).slice(2, 8)}`;
      return (
        <div className={`flex flex-col gap-1.5 ${className}`}>
          {label && (
            <label htmlFor={inputId} className="text-sm font-medium text-zinc-300">
              {label}
            </label>
          )}
          <input
            id={inputId}
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            disabled={disabled}
            inputMode={inputMode}
            maxLength={maxLength}
            autoComplete={autoComplete}
            aria-invalid={!!error}
            aria-describedby={error ? `${inputId}-err` : undefined}
            className={`w-full px-3.5 py-2.5 bg-zinc-900/80 border rounded-xl text-zinc-100 placeholder-zinc-500 transition-colors focus:outline-none focus:ring-2 focus:ring-fuchsia-500/40 focus:border-fuchsia-500/50 disabled:opacity-50 ${
              error ? "border-red-500/60" : "border-zinc-800"
            }`}
            {...rest}
          />
          {error && (
            <p id={`${inputId}-err`} className="text-xs text-red-400" role="alert">{error}</p>
          )}
        </div>
      );
    }

    function Card({ className = "", children, ...rest }) {
      return (
        <div
          className={`bg-zinc-900/60 backdrop-blur-sm border border-zinc-800 rounded-2xl ${className}`}

    function Badge({ variant = "default", className = "", children }) {
      const variants = {
        default: "bg-zinc-800 text-zinc-300 border-zinc-700",
        premium: "bg-fuchsia-500/15 text-fuchsia-300 border-fuchsia-500/30",
        unlocked: "bg-emerald-500/15 text-emerald-300 border-emerald-500/30",

    function Modal({ isOpen, onClose, title, size = "md", children }) {
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => { if (e.key === "Escape") onClose && onClose(); };
        window.addEventListener("keydown", onKey);
        document.body.style.overflow = "hidden";
        return () => {
          window.removeEventListener("keydown", onKey);
          document.body.style.overflow = "";
        };
      }, [isOpen, onClose]);
      if (!isOpen) return null;
      const sizes = { sm: "max-w-sm", md: "max-w-md", lg: "max-w-2xl" };
      return (
        <div
          role="dialog"
          aria-modal="true"
          aria-labelledby={title ? "modal-title" : undefined}
          className="fixed inset-0 z-50 flex items-center justify-center p-4"
        >
          <div
            className="absolute inset-0 bg-black/70 backdrop-blur-sm"
            onClick={onClose}
            aria-hidden="true"
          />
          <div className={`relative w-full ${sizes[size]} bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl pop-in`}>
            {title && (
              <div className="flex items-start justify-between p-5 border-b border-zinc-800">
                <h3 id="modal-title" className="text-lg font-semibold text-white">{title}</h3>
                <button
                  type="button"
                  onClick={onClose}
                  aria-label="닫기"
                  className="text-zinc-500 hover:text-white transition-colors"
                >
                  ✕
                </button>
              </div>
            )}
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🔐 Unlock Context (전역 잠금 상태)
    // ========================================
    const UnlockContext = createContext(null);

    function UnlockProvider({ children }) {
      const [unlockedIds, setUnlockedIds] = useState(() => new Set());
      const unlock = useCallback((id) => {
        setUnlockedIds(prev => {
          const next = new Set(prev);
          next.add(id);
          return next;
        });
      }, []);
      const isUnlocked = useCallback((id) => unlockedIds.has(id), [unlockedIds]);
      const value = useMemo(() => ({
        unlockedIds,
        unlock,
        isUnlocked,
        unlockedCount: unlockedIds.size
      }), [unlockedIds, unlock, isUnlocked]);
      return (
        <UnlockContext.Provider value={value}>{children}</UnlockContext.Provider>
      );
    }

    function useUnlock() { return useContext(UnlockContext); }

              >
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </div>
              <h3 className="text-xl font-bold text-white">여기까지가 미리보기예요</h3>
              <p className="mt-2 text-sm text-zinc-400 leading-relaxed">
                나머지 본문, 작성자 노트, 다운로드, 구독자 코멘트는<br className="hidden sm:block" /> 잠금을 해제하면 바로 열려요.
              </p>
              <div className="my-5 py-4 border-y border-zinc-800">
                <div className="text-xs text-zinc-500 mb-1">단건 구매</div>
                <div className="text-3xl font-extrabold text-white">{formatPrice(article.price)}</div>
              </div>
              <Button onClick={onUnlock} size="lg" className="w-full">
                🔓 지금 잠금 해제하기
              </Button>
              <p className="mt-3 text-[11px] text-zinc-500">
                * 데모 프로토타입입니다. 실제 결제는 발생하지 않아요.
              </p>
            </Card>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 Page — Checkout
    // ========================================
    function CheckoutPage() {
      const params = useParams();
      const { navigate } = useRouter();
      const { unlock, isUnlocked } = useUnlock();
      const article = ARTICLES.find(a => a.id === params.id);

      const [email, setEmail] = useState("");
      const [card1, setCard1] = useState("");
      const [card2, setCard2] = useState("");
      const [card3, setCard3] = useState("");
      const [card4, setCard4] = useState("");
      const [expiry, setExpiry] = useState("");
      const [cvc, setCvc] = useState("");
      const [agree, setAgree] = useState(false);
      const [errors, setErrors] = useState({});
      const [loading, setLoading] = useState(false);
      const [success, setSuccess] = useState(false);

      const c2Ref = useRef(null);
      const c3Ref = useRef(null);
      const c4Ref = useRef(null);

      if (!article) {
        return (
          <div className="max-w-3xl mx-auto px-4 sm:px-6 py-20 text-center">
            <h2 className="text-2xl font-bold text-white">결제할 콘텐츠를 찾을 수 없어요</h2>
            <div className="mt-6">
              <Button onClick={() => navigate("/")}>홈으로 돌아가기</Button>
            </div>
          </div>
        );
      }

      // If already unlocked — gently redirect
      useEffect(() => {
        if (isUnlocked(article.id)) {
          navigate(`/article/${article.id}`);
        }
      }, []); // eslint-disable-line

      const onlyDigits = (s, max) => s.replace(/\D/g, "").slice(0, max);
      const handleCard = (setter, nextRef, max = 4) => (e) => {
        const v = onlyDigits(e.target.value, max);
        setter(v);
        if (v.length === max && nextRef && nextRef.current) nextRef.current.focus();
      };

      const handleExpiry = (e) => {
        let v = e.target.value.replace(/\D/g, "").slice(0, 4);
        if (v.length >= 3) v = v.slice(0, 2) + "/" + v.slice(2);
        setExpiry(v);
      };

      const validate = () => {
        const errs = {};
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) errs.email = "올바른 이메일 형식을 입력해주세요.";
        if (!(card1.length === 4 && card2.length === 4 && card3.length === 4 && card4.length === 4)) {
          errs.card = "카드번호 16자리를 모두 입력해주세요.";
        }
        if (!/^\d{2}\/\d{2}$/.test(expiry)) errs.expiry = "MM/YY 형식으로 입력해주세요.";
        if (!/^\d{3,4}$/.test(cvc)) errs.cvc = "CVC 3~4자리를 입력해주세요.";
        if (!agree) errs.agree = "약관에 동의해야 결제할 수 있어요.";
        return errs;
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const errs = validate();
        setErrors(errs);
        if (Object.keys(errs).length > 0) return;
        setLoading(true);
        setTimeout(() => {
          setLoading(false);
          unlock(article.id);
          setSuccess(true);
        }, 1200);
      };

      const closeAndGoToArticle = () => {
        setSuccess(false);
        navigate(`/article/${article.id}`);
      };

      return (
        <div className="max-w-5xl mx-auto px-4 sm:px-6 py-10 sm:py-14">
          <Link to={`/article/${article.id}`} className="text-sm text-zinc-400 hover:text-white inline-flex items-center gap-1 mb-6">
            <span aria-hidden="true">←</span> 콘텐츠로 돌아가기
          </Link>

          <h1 className="text-2xl sm:text-3xl font-bold text-white tracking-tight">잠금 해제 결제</h1>
          <p className="text-zinc-400 mt-1 text-sm">데모용 페이지예요. 입력한 카드 정보는 어디에도 저장되지 않습니다.</p>

          <div className="mt-8 grid grid-cols-1 lg:grid-cols-5 gap-6">
            {/* Form */}
            <form onSubmit={handleSubmit} className="lg:col-span-3 space-y-5" noValidate>
              <Card className="p-5 sm:p-6 space-y-5">
                <h2 className="text-sm font-semibold text-zinc-300 uppercase tracking-wider">이메일</h2>
                <Input
                  type="email"
                  label="영수증 받을 이메일"
                  placeholder="you@example.com"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  autoComplete="email"
                  error={errors.email}
                />
              </Card>

              <Card className="p-5 sm:p-6 space-y-5">
                <h2 className="text-sm font-semibold text-zinc-300 uppercase tracking-wider">카드 정보</h2>

                <div>
                  <label className="text-sm font-medium text-zinc-300 mb-1.5 block">카드번호</label>
                  <div className="grid grid-cols-4 gap-2">
                    <input
                      aria-label="카드번호 1번째 묶음"
                      inputMode="numeric"
                      maxLength={4}
                      placeholder="1234"
                      value={card1}
                      onChange={handleCard(setCard1, c2Ref)}
                      className={`w-full px-3 py-2.5 bg-zinc-900/80 border rounded-xl text-zinc-100 text-center tracking-[0.2em] focus:outline-none focus:ring-2 focus:ring-fuchsia-500/40 focus:border-fuchsia-500/50 ${errors.card ? "border-red-500/60" : "border-zinc-800"}`}
                    />
                    <input
                      ref={c2Ref}
                      aria-label="카드번호 2번째 묶음"
                      inputMode="numeric"
                      maxLength={4}
                      placeholder="5678"
                      value={card2}
                      onChange={handleCard(setCard2, c3Ref)}
                      className={`w-full px-3 py-2.5 bg-zinc-900/80 border rounded-xl text-zinc-100 text-center tracking-[0.2em] focus:outline-none focus:ring-2 focus:ring-fuchsia-500/40 focus:border-fuchsia-500/50 ${errors.card ? "border-red-500/60" : "border-zinc-800"}`}
                    />
                    <input
                      ref={c3Ref}
                      aria-label="카드번호 3번째 묶음"
                      inputMode="numeric"
                      maxLength={4}
                      placeholder="9012"
                      value={card3}
                      onChange={handleCard(setCard3, c4Ref)}
                      className={`w-full px-3 py-2.5 bg-zinc-900/80 border rounded-xl text-zinc-100 text-center tracking-[0.2em] focus:outline-none focus:ring-2 focus:ring-fuchsia-500/40 focus:border-fuchsia-500/50 ${errors.card ? "border-red-500/60" : "border-zinc-800"}`}
                    />
                    <input
                      ref={c4Ref}
                      aria-label="카드번호 4번째 묶음"
                      inputMode="numeric"
                      maxLength={4}
                      placeholder="3456"
                      value={card4}
                      onChange={(e) => setCard4(onlyDigits(e.target.value, 4))}
                      className={`w-full px-3 py-2.5 bg-zinc-900/80 border rounded-xl text-zinc-100 text-center tracking-[0.2em] focus:outline-none focus:ring-2 focus:ring-fuchsia-500/40 focus:border-fuchsia-500/50 ${errors.card ? "border-red-500/60" : "border-zinc-800"}`}
                    />
                  </div>
                  {errors.card && <p className="text-xs text-red-400 mt-1.5" role="alert">{errors.card}</p>}
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <Input
                    label="유효기간 (MM/YY)"
                    placeholder="06/29"
                    value={expiry}
                    onChange={handleExpiry}
                    inputMode="numeric"
                    maxLength={5}
                    error={errors.expiry}
                  />
                  <Input
                    label="CVC"
                    placeholder="123"
                    value={cvc}
                    onChange={(e) => setCvc(onlyDigits(e.target.value, 4))}
                    inputMode="numeric"
                    maxLength={4}
                    error={errors.cvc}
                  />
                </div>
              </Card>

              <Card className="p-5 sm:p-6">
                <label className="flex items-start gap-3 cursor-pointer select-none">
                  <input
                    type="checkbox"
                    checked={agree}
                    onChange={(e) => setAgree(e.target.checked)}
                    className="mt-0.5 w-4 h-4 rounded accent-fuchsia-500"
                    aria-describedby={errors.agree ? "agree-err" : undefined}
                  />
                  <span className="text-sm text-zinc-300 leading-relaxed">
                    이용약관 및 개인정보 처리방침에 동의하며, 디지털 콘텐츠의 특성상 결제 후 환불이 제한될 수 있음을 확인했습니다.
                  </span>
                </label>
                {errors.agree && <p id="agree-err" className="text-xs text-red-400 mt-2" role="alert">{errors.agree}</p>}
              </Card>

              <Button type="submit" size="lg" disabled={loading} className="w-full">
                {loading ? (
                  <>
                    <span className="spinner inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full" aria-hidden="true" />
                    <span>결제 처리 중...</span>
                  </>
                ) : (
                  <>🔒 {formatPrice(article.price)} 결제하기</>
                )}
              </Button>
            </form>

            {/* Summary */}
            <aside className="lg:col-span-2">
              <Card className="p-5 sm:p-6 lg:sticky lg:top-24">
                <h2 className="text-sm font-semibold text-zinc-300 uppercase tracking-wider mb-4">주문 요약</h2>
                <Thumbnail article={article} />
                <div className="mt-4">
                  <Badge variant="category">{article.category}</Badge>
                  <h3 className="mt-2 text-base font-semibold text-white leading-snug">{article.title}</h3>
                  <p className="mt-1 text-xs text-zinc-500">{article.author} · {article.readMinutes}분 읽기</p>
                </div>
                <div className="mt-5 pt-4 border-t border-zinc-800 space-y-2 text-sm">
                  <div className="flex justify-between text-zinc-400">
                    <span>콘텐츠 단건 구매</span>
                    <span>{formatPrice(article.price)}</span>
                  </div>
                  <div className="flex justify-between text-zinc-400">
                    <span>부가세</span>
                    <span>포함</span>
                  </div>
                  <div className="flex justify-between text-white text-base font-bold pt-3 border-t border-zinc-800">
                    <span>최종 결제 금액</span>
                    <span>{formatPrice(article.price)}</span>
                  </div>
                </div>
                <p className="mt-4 text-[11px] text-zinc-500 leading-relaxed">
                  결제 즉시 영구 열람 권한이 부여돼요. (이 데모에서는 메모리에만 저장돼요.)
                </p>
              </Card>
            </aside>
          </div>

          {/* Success Modal */}
          <Modal isOpen={success} onClose={closeAndGoToArticle} size="sm">
            <div className="text-center">
              <div className="text-5xl mb-3 wiggle" aria-hidden="true">🎉</div>
              <h3 className="text-xl font-bold text-white">잠금 해제 완료!</h3>
              <p className="mt-2 text-sm text-zinc-400 leading-relaxed">
                축하해요. 이제 <span className="text-white font-medium">「{article.title}」</span>의 본문 전체와<br />
                프리미엄 영역을 마음껏 읽을 수 있어요. ✨
              </p>
              <div className="mt-6">
                <Button size="lg" onClick={closeAndGoToArticle} className="w-full">콘텐츠 읽으러 가기 →</Button>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    // ========================================
    // 📄 Page — My Library
    // ========================================
    function MyLibraryPage() {
      const { unlockedIds } = useUnlock();
      const list = ARTICLES.filter(a => unlockedIds.has(a.id));

      return (
        <div className="max-w-6xl mx-auto px-4 sm:px-6 py-10 sm:py-14">
          <header className="mb-8">
            <h1 className="text-3xl sm:text-4xl font-bold text-white tracking-tight">내 라이브러리</h1>
            <p className="mt-2 text-zinc-400">잠금 해제한 모든 콘텐츠를 한 곳에서 다시 만나보세요.</p>
          </header>

          {list.length === 0 ? (
            <Card className="py-16 px-6 text-center">
              <div className="text-5xl mb-4" aria-hidden="true">📭</div>
              <h2 className="text-xl font-bold text-white">아직 잠금 해제한 콘텐츠가 없어요</h2>
              <p className="mt-2 text-zinc-400 text-sm">
                마음에 드는 아티클을 골라 첫 번째 프리미엄 콘텐츠를 만나보세요.
              </p>
              <div className="mt-6">
                <Link to="/">
                  <Button size="lg">홈으로 콘텐츠 둘러보기</Button>
                </Link>
              </div>
            </Card>
          ) : (
            <>
              <div className="mb-5 inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/30 text-emerald-300 text-xs font-medium">
                ✅ {list.length}개 열람 가능
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 sm:gap-6">
                {list.map(article => (
                  <Link
                    key={article.id}
                    to={`/article/${article.id}`}
                    className="block focus:outline-none focus-visible:ring-2 focus-visible:ring-fuchsia-400 rounded-2xl"
                  >
                    <Card className="card-lift overflow-hidden h-full flex flex-col">
                      <div className="p-3">
                        <Thumbnail article={article} />
                      </div>
                      <div className="px-5 pb-5 pt-1 flex flex-col gap-3 flex-1">
                        <div className="flex items-center gap-2 flex-wrap">
                          <Badge variant="category">{article.category}</Badge>
                          <Badge variant="unlocked">✅ 열람 가능</Badge>
                        </div>
                        <h3 className="text-base sm:text-lg font-semibold text-white leading-snug line-clamp-2">
                          {article.title}
                        </h3>
                        <p className="text-sm text-zinc-400 line-clamp-2 leading-relaxed">
                          {article.leadParagraph}
                        </p>
                        <div className="mt-auto pt-3 flex items-center justify-between text-xs text-zinc-500 border-t border-zinc-800/80">
                          <span>{article.author} · {article.readMinutes}분</span>
                          <span className="text-emerald-400 font-bold">계속 읽기 →</span>
                        </div>
                      </div>
                    </Card>
                  </Link>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    // ========================================
    // 📄 Page — Not Found
    // ========================================
    function NotFoundPage() {
      return (
        <div className="max-w-3xl mx-auto px-4 sm:px-6 py-24 text-center">
          <div className="text-6xl mb-4" aria-hidden="true">🌫️</div>
          <h1 className="text-3xl font-bold text-white">페이지를 찾을 수 없어요</h1>
          <p className="mt-2 text-zinc-400">주소를 다시 확인해주세요.</p>
          <div className="mt-6">
            <Link to="/">
              <Button>홈으로 가기</Button>
            </Link>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return (
        <Router>
          <UnlockProvider>
            <div className="min-h-screen flex flex-col">
              <Header />
              <main className="flex-1">
                <Routes>
                  <Route path="/" element={<HomePage />} />
                  <Route path="/article/:id" element={<ArticlePage />} />
                  <Route path="/checkout/:id" element={<CheckoutPage />} />
                  <Route path="/my" element={<MyLibraryPage />} />
                  <Route path="*" element={<NotFoundPage />} />
                </Routes>
              </main>
              <Footer />
            </div>
          </UnlockProvider>
        </Router>
      );
    }

    // ========================================
    // 🔚 Render
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
