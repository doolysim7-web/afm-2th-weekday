<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행 단톡방</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root {
      height: 100%;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }
    @keyframes bubbleIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .bubble-in {
      animation: bubbleIn 200ms ease-out both;
    }
    /* Hide native scrollbar styling for a cleaner look */
    .thread-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .thread-scroll::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.08);
      border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-gradient-to-b from-zinc-50 to-zinc-100">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ========================================
    // 📡 API & Polling Constants
    // ========================================
    const API_BASE_URL = '/api';
    const POLL_INTERVAL_OK = 1500;
    const POLL_INTERVAL_DEGRADED = 5000;
    const POLL_FAIL_THRESHOLD = 3;
    const NICKNAME_STORAGE_KEY = 'chat-nickname';

    const ROOM = {
      title: '여행 단톡방',
      avatar: 'https://i.pravatar.cc/80?img=12',
    };

    // ========================================
    // Utils
    // ========================================
    function formatTime(input) {
      // input can be ISO string or Date
      const d = input ? new Date(input) : new Date();
      if (isNaN(d.getTime())) return '';
      const h = d.getHours();
      const m = d.getMinutes().toString().padStart(2, '0');
      const ampm = h < 12 ? '오전' : '오후';
      const hh = h % 12 === 0 ? 12 : h % 12;
      return `${ampm} ${hh}:${m}`;
    }

    function generateNickname() {
      const n = Math.floor(1000 + Math.random() * 9000);
      return `여행자-${n}`;
    }

    function loadOrCreateNickname() {
      try {
        const existing = localStorage.getItem(NICKNAME_STORAGE_KEY);
        if (existing && existing.trim()) return existing.trim();
      } catch (_) {}
      const fresh = generateNickname();
      try { localStorage.setItem(NICKNAME_STORAGE_KEY, fresh); } catch (_) {}
      return fresh;
    }

    // Stable per-name color for non-self avatar fallbacks
    function colorFromName(name) {
      const palette = [
        'bg-emerald-500', 'bg-amber-500', 'bg-rose-500',
        'bg-violet-500', 'bg-cyan-500', 'bg-fuchsia-500',
        'bg-orange-500', 'bg-teal-500', 'bg-indigo-500',
      ];
      let hash = 0;
      for (let i = 0; i < (name || '').length; i++) {
        hash = ((hash << 5) - hash) + name.charCodeAt(i);
        hash |= 0;
      }
      return palette[Math.abs(hash) % palette.length];
    }

    // ========================================
    // Inline SVG Icons
    // ========================================
    const IconSearch = (props) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
        <circle cx="11" cy="11" r="7" />
        <path d="m20 20-3.5-3.5" />
      </svg>
    );

    const IconPhone = (props) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
      </svg>
    );

    const IconMore = (props) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
        <circle cx="12" cy="12" r="1" />
        <circle cx="19" cy="12" r="1" />
        <circle cx="5" cy="12" r="1" />
      </svg>
    );

    const IconPlus = (props) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
        <path d="M12 5v14M5 12h14" />
      </svg>
    );

    const IconSend = (props) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
        <path d="m22 2-7 20-4-9-9-4 20-7z" />
      </svg>
    );

    const IconPencil = (props) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
        <path d="M12 20h9" />
        <path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z" />
      </svg>
    );

    // ========================================
    // 🎨 Design System: Avatar
    // ========================================
    function Avatar({ src, name, size = 36, className = '', colorClass }) {
      const [errored, setErrored] = useState(false);
      const px = `${size}px`;
      if (!src || errored) {
        const initial = (name || '?').slice(0, 1).toUpperCase();
        const bg = colorClass || colorFromName(name || '');
        return (
          <div
            className={`flex items-center justify-center rounded-full text-white font-semibold ${bg} ${className}`}
            style={{ width: px, height: px, fontSize: size * 0.42 }}
          >
            {initial}
          </div>
        );
      }
      return (
        <img
          src={src}
          alt={name}
          onError={() => setErrored(true)}
          className={`rounded-full object-cover bg-zinc-200 ${className}`}
          style={{ width: px, height: px }}
        />
      );
    }

    // ========================================
    // 🎨 Design System: GhostIconButton
    // ========================================
    function GhostIconButton({ children, label, onClick }) {
      return (
        <button
          type="button"
          aria-label={label}
          onClick={onClick}
          className="p-2 rounded-full text-zinc-500 hover:text-zinc-900 hover:bg-zinc-100 transition-colors"
        >
          {children}
        </button>
      );
    }

    // ========================================
    // 🧩 ChatHeader (with inline nickname rename)
    // ========================================
    function ChatHeader({ nickname, onRename }) {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(nickname);
      const inputRef = useRef(null);

      useEffect(() => {
        if (editing && inputRef.current) {
          inputRef.current.focus();
          inputRef.current.select();
        }
      }, [editing]);

      function startEdit() {
        setDraft(nickname);
        setEditing(true);
      }

      function commit() {
        const next = (draft || '').trim();
        if (next && next !== nickname) {
          onRename(next);
        }
        setEditing(false);
      }

      function cancel() {
        setEditing(false);
        setDraft(nickname);
      }

      function handleKeyDown(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          commit();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          cancel();
        }
      }

      return (
        <header className="flex items-center gap-3 px-4 sm:px-5 py-3 border-b border-zinc-200">
          <Avatar src={ROOM.avatar} name={ROOM.title} size={40} />
          <div className="flex-1 min-w-0">
            <div className="text-sm font-semibold text-zinc-900 truncate">{ROOM.title}</div>
            <div className="flex items-center gap-1.5 text-xs text-zinc-500 mt-0.5 min-w-0">
              <span className="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 shrink-0" aria-hidden="true" />
              {editing ? (
                <input
                  ref={inputRef}
                  value={draft}
                  onChange={(e) => setDraft(e.target.value)}
                  onKeyDown={handleKeyDown}
                  onBlur={commit}
                  maxLength={24}
                  aria-label="닉네임 수정"
                  className="bg-zinc-100 border border-zinc-300 rounded-md px-1.5 py-0.5 text-xs text-zinc-900 outline-none focus:border-blue-400 min-w-0 max-w-[160px]"
                />
              ) : (
                <span className="truncate">{nickname}</span>
              )}
              {!editing && (
                <button
                  type="button"
                  onClick={startEdit}
                  aria-label="닉네임 수정"
                  className="ml-0.5 p-0.5 rounded text-zinc-400 hover:text-zinc-700 hover:bg-zinc-100 transition-colors"
                >
                  <IconPencil className="w-3 h-3" />
                </button>
              )}
            </div>
          </div>
          <div className="flex items-center gap-0.5">
            <GhostIconButton label="검색"><IconSearch className="w-5 h-5" /></GhostIconButton>
            <GhostIconButton label="음성 통화"><IconPhone className="w-5 h-5" /></GhostIconButton>
            <GhostIconButton label="더보기"><IconMore className="w-5 h-5" /></GhostIconButton>
          </div>
        </header>
      );
    }

    // ========================================
    // 🧩 DateDivider
    // ========================================
    function DateDivider({ label }) {
      return (
        <div className="flex justify-center my-2">
          <span className="bg-zinc-100 text-zinc-500 text-xs px-3 py-1 rounded-full">{label}</span>
        </div>
      );
    }

    // ========================================
    // 🧩 ConnectionBanner
    // ========================================
    function ConnectionBanner({ kind, message, onRetry }) {
      const tone = kind === 'error'
        ? 'bg-red-50 text-red-700 border-red-200'
        : 'bg-amber-50 text-amber-700 border-amber-200';
      return (
        <div className={`text-xs px-3 py-2 border-b ${tone} flex items-center justify-between gap-2`}>
          <span className="truncate">{message}</span>
          {onRetry && (
            <button
              type="button"
              onClick={onRetry}
              className="shrink-0 px-2 py-0.5 rounded-md bg-white/60 hover:bg-white border border-current/20 font-medium"
            >
              다시 시도
            </button>
          )}
        </div>
      );
    }

    // ========================================
    // 🧩 MessageBubble
    // ========================================
    function MessageBubble({ message, isMe, showSenderLabel, showAvatar, showTime, isLastOfStreak, onRetry }) {
      const failed = message.failed === true;
      const pending = message.pending === true;

      const bubbleBase = 'inline-block max-w-[80%] sm:max-w-[75%] px-3.5 py-2 text-sm leading-relaxed break-words whitespace-pre-wrap';
      const bubbleColor = isMe
        ? (failed ? 'bg-red-400 text-white' : 'bg-blue-500 text-white')
        : 'bg-zinc-100 text-zinc-900';
      const bubbleShape = isMe
        ? (isLastOfStreak ? 'rounded-2xl rounded-br-sm' : 'rounded-2xl')
        : (isLastOfStreak ? 'rounded-2xl rounded-bl-sm' : 'rounded-2xl');
      const opacity = pending && !failed ? 'opacity-70' : '';

      return (
        <div className={`flex items-end gap-2 bubble-in ${isMe ? 'justify-end' : 'justify-start'}`}>
          {!isMe && (
            <div className="w-8 shrink-0">
              {showAvatar ? (
                <Avatar name={message.sender} size={32} />
              ) : null}
            </div>
          )}
          <div className={`flex flex-col ${isMe ? 'items-end' : 'items-start'} min-w-0`}>
            {!isMe && showSenderLabel && (
              <div className="text-[11px] text-zinc-500 mb-0.5 px-1">{message.sender}</div>
            )}
            <div
              className={`${bubbleBase} ${bubbleColor} ${bubbleShape} ${opacity} ${failed ? 'cursor-pointer' : ''}`}
              onClick={failed && onRetry ? () => onRetry(message) : undefined}
              title={failed ? '클릭해서 다시 보내기' : undefined}
            >
              {message.text}
            </div>
            {failed && (
              <div className="text-[11px] text-red-500 mt-1 px-1">! 전송 실패 — 클릭해서 재시도</div>
            )}
            {!failed && showTime && (
              <div className="text-[11px] text-zinc-400 mt-1 px-1">
                {pending ? '보내는 중…' : formatTime(message.created_at)}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 MessageThread
    // ========================================
    function MessageThread({ messages, nickname, onRetry }) {
      const bottomRef = useRef(null);

      useEffect(() => {
        if (bottomRef.current) {
          bottomRef.current.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
      }, [messages]);

      // Decorate each message with grouping flags based on sender
      const decorated = useMemo(() => {
        return messages.map((m, i) => {
          const prev = messages[i - 1];
          const next = messages[i + 1];
          const isFirstOfStreak = !prev || prev.sender !== m.sender;
          const isLastOfStreak  = !next || next.sender !== m.sender;
          return { ...m, isFirstOfStreak, isLastOfStreak };
        });
      }, [messages]);

      return (
        <div className="flex-1 overflow-y-auto thread-scroll px-4 sm:px-5 py-4">
          <DateDivider label="오늘" />
          <div className="flex flex-col gap-1">
            {decorated.map((m, i) => {
              const prev = decorated[i - 1];
              const isMe = m.sender === nickname;
              const isSameSenderAsPrev = prev && prev.sender === m.sender;
              return (
                <div key={m.id} className={isSameSenderAsPrev ? 'mt-0.5' : 'mt-3'}>
                  <MessageBubble
                    message={m}
                    isMe={isMe}
                    showSenderLabel={!isMe && m.isFirstOfStreak}
                    showAvatar={!isMe && m.isFirstOfStreak}
                    showTime={m.isLastOfStreak}
                    isLastOfStreak={m.isLastOfStreak}
                    onRetry={onRetry}
                  />
                </div>
              );
            })}
          </div>
          <div ref={bottomRef} />
        </div>
      );
    }

    // ========================================
    // 🧩 Composer
    // ========================================
    function Composer({ onSend, sending }) {
      const [value, setValue] = useState('');
      const trimmed = value.trim();
      const canSend = trimmed.length > 0 && !sending;

      function submit() {
        if (!canSend) return;
        onSend(trimmed);
        setValue('');
      }

      function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          submit();
        }
      }

      return (
        <div className="border-t border-zinc-200 px-3 sm:px-4 py-3 bg-white">
          <div className="flex items-center gap-2">
            <button
              type="button"
              aria-label="첨부"
              className="shrink-0 p-2 rounded-full text-zinc-500 hover:text-zinc-900 hover:bg-zinc-100 transition-colors"
            >
              <IconPlus className="w-5 h-5" />
            </button>
            <input
              type="text"
              value={value}
              onChange={(e) => setValue(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="메시지를 입력하세요"
              aria-label="메시지 입력"
              className="flex-1 min-w-0 bg-zinc-100 focus:bg-white border border-transparent focus:border-zinc-300 rounded-full px-4 py-2.5 text-sm text-zinc-900 placeholder:text-zinc-400 outline-none transition-colors"
            />
            <button
              type="button"
              aria-label="보내기"
              onClick={submit}
              disabled={!canSend}
              className={`shrink-0 flex items-center justify-center w-10 h-10 rounded-full text-white transition-colors ${
                canSend
                  ? 'bg-blue-500 hover:bg-blue-600 cursor-pointer'
                  : 'bg-blue-500 opacity-40 cursor-not-allowed'
              }`}
            >
              <IconSend className="w-4 h-4 -ml-0.5" />
            </button>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [nickname, setNickname] = useState(() => loadOrCreateNickname());
      const [messages, setMessages] = useState([]);
      const [initialLoading, setInitialLoading] = useState(true);
      const [initialError, setInitialError] = useState(false);
      const [degraded, setDegraded] = useState(false); // true when N consecutive poll failures
      const [sending, setSending] = useState(false);

      // Refs for polling closure
      const lastIdRef = useRef(0);
      const messagesRef = useRef([]);
      const failCountRef = useRef(0);
      const pollTimerRef = useRef(null);
      const pausedRef = useRef(false);

      // Keep messagesRef in sync (for de-dupe inside async paths)
      useEffect(() => {
        messagesRef.current = messages;
        // Recompute lastId from real (non-temp) messages
        let max = 0;
        for (const m of messages) {
          if (typeof m.id === 'number' && m.id > 0 && m.id > max) max = m.id;
        }
        lastIdRef.current = max;
      }, [messages]);

      // ---- Nickname rename ----
      const handleRename = useCallback((next) => {
        setNickname(next);
        try { localStorage.setItem(NICKNAME_STORAGE_KEY, next); } catch (_) {}
      }, []);

      // ---- Initial load ----
      const loadInitial = useCallback(async () => {
        setInitialLoading(true);
        setInitialError(false);
        try {
          const res = await fetch(`${API_BASE_URL}/messages`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const json = await res.json();
          const data = (json && json.data) || [];
          setMessages(data);
          setInitialLoading(false);
        } catch (err) {
          setInitialError(true);
          setInitialLoading(false);
        }
      }, []);

      useEffect(() => {
        loadInitial();
      }, [loadInitial]);

      // ---- Polling ----
      const pollOnce = useCallback(async () => {
        if (pausedRef.current) return;
        try {
          const since = lastIdRef.current || 0;
          const res = await fetch(`${API_BASE_URL}/messages?since=${since}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const json = await res.json();
          const incoming = (json && json.data) || [];
          if (incoming.length > 0) {
            setMessages((prev) => {
              const knownIds = new Set();
              for (const m of prev) {
                if (typeof m.id === 'number' && m.id > 0) knownIds.add(m.id);
              }
              const fresh = incoming.filter((m) => !knownIds.has(m.id));
              if (fresh.length === 0) return prev;
              return [...prev, ...fresh];
            });
          }
          // Success: reset failures + degraded mode
          if (failCountRef.current !== 0 || degraded) {
            failCountRef.current = 0;
            setDegraded(false);
          }
        } catch (err) {
          failCountRef.current += 1;
          if (failCountRef.current >= POLL_FAIL_THRESHOLD && !degraded) {
            setDegraded(true);
          }
        }
      }, [degraded]);

      // Schedule polling with cadence dependent on `degraded`
      useEffect(() => {
        // Don't start polling until initial load resolves (success or failure)
        if (initialLoading) return;

        const interval = degraded ? POLL_INTERVAL_DEGRADED : POLL_INTERVAL_OK;
        pollTimerRef.current = setInterval(() => {
          pollOnce();
        }, interval);

        return () => {
          if (pollTimerRef.current) {
            clearInterval(pollTimerRef.current);
            pollTimerRef.current = null;
          }
        };
      }, [degraded, initialLoading, pollOnce]);

      // Pause polling while tab is hidden
      useEffect(() => {
        function handleVisibility() {
          const hidden = document.visibilityState === 'hidden';
          pausedRef.current = hidden;
          if (!hidden) {
            // Fire one immediate poll on resume so the user sees the latest
            pollOnce();
          }
        }
        document.addEventListener('visibilitychange', handleVisibility);
        // Initialize current state
        pausedRef.current = document.visibilityState === 'hidden';
        return () => document.removeEventListener('visibilitychange', handleVisibility);
      }, [pollOnce]);

      // ---- Sending (optimistic + retry) ----
      const sendMessage = useCallback(async (text, existingTempId) => {
        const tempId = existingTempId != null ? existingTempId : -Date.now();

        if (existingTempId != null) {
          // Retry: clear failed flag, mark pending again
          setMessages((prev) =>
            prev.map((m) => (m.id === tempId ? { ...m, pending: true, failed: false } : m))
          );
        } else {
          // First attempt: append optimistic bubble
          const optimistic = {
            id: tempId,
            sender: nickname,
            text,
            created_at: new Date().toISOString(),
            pending: true,
            failed: false,
          };
          setMessages((prev) => [...prev, optimistic]);
        }

        setSending(true);
        try {
          const res = await fetch(`${API_BASE_URL}/messages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sender: nickname, text }),
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const json = await res.json();
          const real = json && json.data;
          if (!real || typeof real.id !== 'number') throw new Error('Bad response');

          // Replace temp bubble with real one; if poll already inserted it, drop the temp
          setMessages((prev) => {
            const hasReal = prev.some((m) => m.id === real.id);
            if (hasReal) {
              return prev.filter((m) => m.id !== tempId);
            }
            return prev.map((m) => (m.id === tempId ? { ...real } : m));
          });
        } catch (err) {
          // Mark the temp bubble as failed
          setMessages((prev) =>
            prev.map((m) => (m.id === tempId ? { ...m, pending: false, failed: true } : m))
          );
        } finally {
          setSending(false);
        }
      }, [nickname]);

      const handleSend = useCallback((text) => {
        sendMessage(text, null);
      }, [sendMessage]);

      const handleRetry = useCallback((failedMsg) => {
        if (!failedMsg || failedMsg.id >= 0) return;
        sendMessage(failedMsg.text, failedMsg.id);
      }, [sendMessage]);

      // ---- Render ----
      return (
        <div className="min-h-full flex items-stretch sm:items-center sm:justify-center sm:p-6">
          <div className="w-full sm:max-w-[640px] h-screen sm:h-[80vh] sm:max-h-[760px] flex flex-col bg-white sm:border sm:border-zinc-200 sm:rounded-2xl sm:shadow-sm overflow-hidden">
            <ChatHeader nickname={nickname} onRename={handleRename} />

            {initialError && (
              <ConnectionBanner
                kind="error"
                message="서버에 연결할 수 없어요. 서버를 실행했나요?"
                onRetry={loadInitial}
              />
            )}
            {!initialError && degraded && (
              <ConnectionBanner
                kind="warn"
                message="🔌 연결 끊김 — 재시도 중"
              />
            )}

            {initialLoading ? (
              <div className="flex-1 flex items-center justify-center text-sm text-zinc-400">
                불러오는 중...
              </div>
            ) : (
              <MessageThread
                messages={messages}
                nickname={nickname}
                onRetry={handleRetry}
              />
            )}

            <Composer onSend={handleSend} sending={sending} />
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
