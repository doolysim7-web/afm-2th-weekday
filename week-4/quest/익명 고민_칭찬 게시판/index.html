<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>익명 고민 & 칭찬 게시판</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes heartBounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.4); }
      60% { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    .heart-bounce {
      animation: heartBounce 0.4s ease-in-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up {
      animation: fadeInUp 0.35s ease-out;
    }
  </style>
</head>
<body class="bg-orange-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useCallback, useRef } = React;

    // ========================================
    // API Configuration
    // ========================================
    const API_BASE_URL = window.location.hostname === 'localhost'
      ? `http://${window.location.hostname}:3000/api`
      : '/api';

    // ========================================
    // Utilities
    // ========================================
    function timeAgo(dateString) {
      const now = new Date();
      const past = new Date(dateString);
      const diffMs = now - past;
      const diffSec = Math.floor(diffMs / 1000);
      const diffMin = Math.floor(diffSec / 60);
      const diffHour = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHour / 24);
      const diffWeek = Math.floor(diffDay / 7);
      const diffMonth = Math.floor(diffDay / 30);

      if (diffSec < 10) return '방금 전';
      if (diffSec < 60) return `${diffSec}초 전`;
      if (diffMin < 60) return `${diffMin}분 전`;
      if (diffHour < 24) return `${diffHour}시간 전`;
      if (diffDay < 7) return `${diffDay}일 전`;
      if (diffWeek < 5) return `${diffWeek}주 전`;
      return `${diffMonth}개월 전`;
    }

    const CATEGORY_STYLES = {
      고민: {
        bg: 'bg-blue-100',
        text: 'text-blue-700',
        border: 'border-blue-200',
        activeBg: 'bg-blue-500',
        activeText: 'text-white',
        ring: 'ring-blue-300',
        cardAccent: 'border-l-blue-400',
      },
      칭찬: {
        bg: 'bg-amber-100',
        text: 'text-amber-700',
        border: 'border-amber-200',
        activeBg: 'bg-amber-500',
        activeText: 'text-white',
        ring: 'ring-amber-300',
        cardAccent: 'border-l-amber-400',
      },
      응원: {
        bg: 'bg-emerald-100',
        text: 'text-emerald-700',
        border: 'border-emerald-200',
        activeBg: 'bg-emerald-500',
        activeText: 'text-white',
        ring: 'ring-emerald-300',
        cardAccent: 'border-l-emerald-400',
      },
    };

    // ========================================
    // Design System Components
    // ========================================
    function Button({ children, variant = 'primary', size = 'md', disabled, onClick, className = '', type = 'button' }) {
      const base = 'font-semibold rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer';
      const variants = {
        primary: 'bg-rose-400 hover:bg-rose-500 text-white focus:ring-rose-300 shadow-md hover:shadow-lg',
        secondary: 'bg-white hover:bg-gray-50 text-gray-700 border border-gray-200 focus:ring-gray-300',
        danger: 'bg-red-100 hover:bg-red-200 text-red-600 focus:ring-red-300',
        ghost: 'bg-transparent hover:bg-gray-100 text-gray-500 focus:ring-gray-200',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-5 py-2.5 text-base',
        lg: 'px-7 py-3 text-lg',
      };
      return (
        <button
          type={type}
          disabled={disabled}
          onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, error, disabled, className = '', ...rest }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-600 mb-1.5">{label}</label>}
          <input
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            disabled={disabled}
            className={`w-full px-4 py-2.5 rounded-xl border ${error ? 'border-red-300 focus:ring-red-300' : 'border-gray-200 focus:ring-rose-300'} focus:outline-none focus:ring-2 focus:border-transparent transition-all bg-white text-gray-800 placeholder-gray-400`}
            {...rest}
          />
          {error && <p className="mt-1 text-sm text-red-500">{error}</p>}
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}>
          {children}
        </div>
      );
    }

    function Modal({ isOpen, onClose, title, children }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" />
          <div
            className="relative bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm fade-in-up"
            onClick={(e) => e.stopPropagation()}
          >
            {title && <h3 className="text-lg font-bold text-gray-800 mb-3">{title}</h3>}
            {children}
          </div>
        </div>
      );
    }

    function Badge({ category }) {
      const style = CATEGORY_STYLES[category];
      if (!style) return null;
      return (
        <span className={`inline-block px-3 py-1 rounded-full text-xs font-bold ${style.bg} ${style.text}`}>
          {category}
        </span>
      );
    }

    // ========================================
    // Page: Header
    // ========================================
    function Header() {
      return (
        <header className="bg-gradient-to-r from-rose-400 via-pink-400 to-orange-300 text-white py-8 px-4 shadow-lg">
          <div className="max-w-2xl mx-auto text-center">
            <h1 className="text-2xl sm:text-3xl font-extrabold tracking-tight">
              익명 고민 & 칭찬 게시판
            </h1>
            <p className="mt-2 text-rose-100 text-sm sm:text-base font-medium">
              마음을 나누는 따뜻한 공간
            </p>
          </div>
        </header>
      );
    }

    // ========================================
    // Page: Post Form
    // ========================================
    function PostForm({ onPostCreated }) {
      const [nickname, setNickname] = useState('');
      const [category, setCategory] = useState('고민');
      const [content, setContent] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState('');

      const categories = ['고민', '칭찬', '응원'];

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!content.trim()) {
          setError('내용을 입력해주세요.');
          return;
        }
        setError('');
        setSubmitting(true);
        try {
          const res = await fetch(`${API_BASE_URL}/posts`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              nickname: nickname.trim() || '익명',
              category,
              content: content.trim(),
            }),
          });
          const json = await res.json();
          if (!res.ok || !json.success) throw new Error(json.message || '작성 실패');
          setNickname('');
          setContent('');
          setCategory('고민');
          onPostCreated();
        } catch (err) {
          setError(err.message || '글 작성에 실패했습니다.');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <Card className="p-5 sm:p-6">
          <form onSubmit={handleSubmit}>
            <Input
              label="닉네임"
              value={nickname}
              onChange={(e) => setNickname(e.target.value)}
              placeholder="익명"
              className="mb-4"
            />

            <div className="mb-4">
              <label className="block text-sm font-medium text-gray-600 mb-2">카테고리</label>
              <div className="flex gap-2">
                {categories.map((cat) => {
                  const style = CATEGORY_STYLES[cat];
                  const isActive = category === cat;
                  return (
                    <button
                      key={cat}
                      type="button"
                      onClick={() => setCategory(cat)}
                      className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all duration-200 cursor-pointer focus:outline-none focus:ring-2 ${style.ring} ${
                        isActive
                          ? `${style.activeBg} ${style.activeText} shadow-md`
                          : `${style.bg} ${style.text} hover:opacity-80`
                      }`}
                    >
                      {cat}
                    </button>
                  );
                })}
              </div>
            </div>

            <div className="mb-4">
              <label className="block text-sm font-medium text-gray-600 mb-1.5">내용</label>
              <textarea
                value={content}
                onChange={(e) => setContent(e.target.value)}
                placeholder="마음속 이야기를 나눠보세요..."
                rows={4}
                className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-transparent transition-all bg-white text-gray-800 placeholder-gray-400 resize-none"
              />
            </div>

            {error && <p className="text-sm text-red-500 mb-3">{error}</p>}

            <Button type="submit" disabled={submitting} className="w-full" size="lg">
              {submitting ? '올리는 중...' : '글 올리기'}
            </Button>
          </form>
        </Card>
      );
    }

    // ========================================
    // Page: Sort Toggle
    // ========================================
    function SortToggle({ sort, onSortChange }) {
      const options = [
        { value: 'latest', label: '최신순' },
        { value: 'popular', label: '공감순' },
      ];
      return (
        <div className="flex gap-2">
          {options.map((opt) => (
            <button
              key={opt.value}
              onClick={() => onSortChange(opt.value)}
              className={`px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-rose-300 ${
                sort === opt.value
                  ? 'bg-rose-400 text-white shadow-md'
                  : 'bg-white text-gray-500 hover:bg-gray-50 border border-gray-200'
              }`}
            >
              {opt.label}
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // Page: Post Card
    // ========================================
    function PostCard({ post, onLike, onDelete }) {
      const [bouncing, setBouncing] = useState(false);
      const [showDeleteModal, setShowDeleteModal] = useState(false);
      const style = CATEGORY_STYLES[post.category] || CATEGORY_STYLES['고민'];

      const handleLike = async () => {
        setBouncing(true);
        await onLike(post.id);
        setTimeout(() => setBouncing(false), 400);
      };

      const handleDelete = () => {
        setShowDeleteModal(true);
      };

      const confirmDelete = () => {
        setShowDeleteModal(false);
        onDelete(post.id);
      };

      return (
        <>
          <Card className={`p-5 border-l-4 ${style.cardAccent} fade-in-up relative group`}>
            <button
              onClick={handleDelete}
              className="absolute top-3 right-3 w-7 h-7 flex items-center justify-center rounded-full text-gray-300 hover:text-red-400 hover:bg-red-50 transition-all opacity-0 group-hover:opacity-100 focus:opacity-100 cursor-pointer focus:outline-none"
              aria-label="삭제"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" className="w-4 h-4">
                <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" />
              </svg>
            </button>

            <div className="flex items-center gap-2 mb-3">
              <Badge category={post.category} />
              <span className="text-sm font-medium text-gray-600">{post.nickname || '익명'}</span>
              <span className="text-xs text-gray-400 ml-auto mr-8">{timeAgo(post.created_at)}</span>
            </div>

            <p className="text-gray-800 leading-relaxed whitespace-pre-wrap mb-4 text-[15px]">
              {post.content}
            </p>

            <div className="flex items-center">
              <button
                onClick={handleLike}
                className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-rose-50 hover:bg-rose-100 text-rose-500 transition-all cursor-pointer focus:outline-none focus:ring-2 focus:ring-rose-300"
                aria-label="공감"
              >
                <span className={`text-lg ${bouncing ? 'heart-bounce' : ''}`}>
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5">
                    <path d="m11.645 20.91-.007-.003-.022-.012a15.247 15.247 0 0 1-.383-.218 25.18 25.18 0 0 1-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0 1 12 5.052 5.5 5.5 0 0 1 16.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 0 1-4.244 3.17 15.247 15.247 0 0 1-.383.219l-.022.012-.007.004-.003.001a.752.752 0 0 1-.704 0l-.003-.001Z" />
                  </svg>
                </span>
                <span className="text-sm font-bold">{post.likes || 0}</span>
              </button>
            </div>
          </Card>

          <Modal
            isOpen={showDeleteModal}
            onClose={() => setShowDeleteModal(false)}
            title="글 삭제"
          >
            <p className="text-gray-600 mb-5">이 글을 정말 삭제하시겠습니까?</p>
            <div className="flex gap-3 justify-end">
              <Button variant="secondary" size="sm" onClick={() => setShowDeleteModal(false)}>
                취소
              </Button>
              <Button variant="danger" size="sm" onClick={confirmDelete}>
                삭제
              </Button>
            </div>
          </Modal>
        </>
      );
    }

    // ========================================
    // Page: Post List
    // ========================================
    function PostList({ posts, loading, onLike, onDelete }) {
      if (loading) {
        return (
          <div className="text-center py-16">
            <div className="inline-block w-8 h-8 border-4 border-rose-200 border-t-rose-400 rounded-full animate-spin" />
            <p className="mt-3 text-gray-400 text-sm">불러오는 중...</p>
          </div>
        );
      }

      if (!posts || posts.length === 0) {
        return (
          <div className="text-center py-16">
            <div className="text-5xl mb-4 opacity-50">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1} stroke="currentColor" className="w-16 h-16 mx-auto text-gray-300">
                <path strokeLinecap="round" strokeLinejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 0 1 .865-.501 48.172 48.172 0 0 0 3.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" />
              </svg>
            </div>
            <p className="text-gray-400 font-medium">아직 작성된 글이 없습니다.</p>
            <p className="text-gray-300 text-sm mt-1">첫 번째 이야기를 나눠보세요!</p>
          </div>
        );
      }

      return (
        <div className="space-y-4">
          {posts.map((post) => (
            <PostCard key={post.id} post={post} onLike={onLike} onDelete={onDelete} />
          ))}
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [posts, setPosts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [sort, setSort] = useState('latest');
      const [fetchError, setFetchError] = useState('');

      const fetchPosts = useCallback(async () => {
        setLoading(true);
        setFetchError('');
        try {
          const res = await fetch(`${API_BASE_URL}/posts?sort=${sort}`);
          const json = await res.json();
          const items = json.data;
          setPosts(Array.isArray(items) ? items : []);
        } catch (err) {
          setFetchError('게시글을 불러오지 못했습니다.');
          setPosts([]);
        } finally {
          setLoading(false);
        }
      }, [sort]);

      useEffect(() => {
        fetchPosts();
      }, [fetchPosts]);

      const handleLike = async (id) => {
        setPosts((prev) =>
          prev.map((p) => (p.id === id ? { ...p, likes: (p.likes || 0) + 1 } : p))
        );
        try {
          const res = await fetch(`${API_BASE_URL}/posts/${id}/like`, { method: 'PATCH' });
          const json = await res.json();
          if (!res.ok || !json.success) throw new Error();
        } catch {
          setPosts((prev) =>
            prev.map((p) => (p.id === id ? { ...p, likes: Math.max(0, (p.likes || 0) - 1) } : p))
          );
        }
      };

      const handleDelete = async (id) => {
        const original = posts;
        setPosts((prev) => prev.filter((p) => p.id !== id));
        try {
          const res = await fetch(`${API_BASE_URL}/posts/${id}`, { method: 'DELETE' });
          const json = await res.json();
          if (!res.ok || !json.success) throw new Error();
        } catch {
          setPosts(original);
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-b from-orange-50 via-rose-50 to-amber-50">
          <Header />

          <main className="max-w-2xl mx-auto px-4 py-6 space-y-6 pb-16">
            <PostForm onPostCreated={fetchPosts} />

            <div className="flex items-center justify-between">
              <h2 className="text-lg font-bold text-gray-700">
                게시글 <span className="text-rose-400">{posts.length}</span>
              </h2>
              <SortToggle sort={sort} onSortChange={setSort} />
            </div>

            {fetchError && (
              <div className="text-center py-4">
                <p className="text-red-400 text-sm">{fetchError}</p>
                <button
                  onClick={fetchPosts}
                  className="mt-2 text-sm text-rose-500 underline hover:text-rose-600 cursor-pointer"
                >
                  다시 시도
                </button>
              </div>
            )}

            <PostList posts={posts} loading={loading} onLike={handleLike} onDelete={handleDelete} />
          </main>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
