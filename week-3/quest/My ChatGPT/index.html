<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 프로필 채팅</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    @keyframes bounce-dot {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    .dot-1 { animation: bounce-dot 1.2s infinite 0s; }
    .dot-2 { animation: bounce-dot 1.2s infinite 0.2s; }
    .dot-3 { animation: bounce-dot 1.2s infinite 0.4s; }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-animate { animation: fade-in 0.3s ease-out; }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-up { animation: slide-up 0.4s ease-out; }
  </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback, useId } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    const THEME_COLORS = {
      emerald: { bg: 'bg-emerald-500', light: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-700', gradient: 'from-emerald-400 to-teal-500', ring: 'ring-emerald-300' },
      violet:  { bg: 'bg-violet-500',  light: 'bg-violet-50',  border: 'border-violet-300',  text: 'text-violet-700',  gradient: 'from-violet-400 to-purple-500', ring: 'ring-violet-300' },
      rose:    { bg: 'bg-rose-500',    light: 'bg-rose-50',    border: 'border-rose-300',    text: 'text-rose-700',    gradient: 'from-rose-400 to-pink-500',   ring: 'ring-rose-300' },
      amber:   { bg: 'bg-amber-500',   light: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-700',   gradient: 'from-amber-400 to-orange-500', ring: 'ring-amber-300' },
      sky:     { bg: 'bg-sky-500',     light: 'bg-sky-50',     border: 'border-sky-300',     text: 'text-sky-700',     gradient: 'from-sky-400 to-blue-500',    ring: 'ring-sky-300' },
      slate:   { bg: 'bg-slate-600',   light: 'bg-slate-50',   border: 'border-slate-300',   text: 'text-slate-700',   gradient: 'from-slate-500 to-slate-700', ring: 'ring-slate-300' },
    };

    function Button({ children, onClick, variant = 'primary', size = 'md', disabled = false, className = '', color = 'sky' }) {
      const theme = THEME_COLORS[color] || THEME_COLORS.sky;
      const base = 'inline-flex items-center justify-center font-medium rounded-xl transition-all focus:outline-none';
      const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };
      const variants = {
        primary: `bg-gradient-to-r ${theme.gradient} text-white shadow-sm hover:shadow-md hover:opacity-90 disabled:opacity-40`,
        secondary: `bg-white border ${theme.border} ${theme.text} hover:${theme.light} disabled:opacity-40`,
        ghost: 'bg-transparent text-slate-600 hover:bg-slate-100 disabled:opacity-40',
        danger: 'bg-red-500 text-white hover:bg-red-600 disabled:opacity-40',
      };
      return (
        <button onClick={onClick} disabled={disabled} className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, type = 'text', error, disabled = false, className = '' }) {
      return (
        <div className={`flex flex-col gap-1 ${className}`}>
          {label && <label className="text-sm font-medium text-slate-700">{label}</label>}
          <input
            type={type}
            value={value}
            onChange={e => onChange(e.target.value)}
            placeholder={placeholder}
            disabled={disabled}
            className={`px-3 py-2.5 rounded-xl border text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 transition-all disabled:opacity-50 ${
              error ? 'border-red-300 focus:border-red-400 focus:ring-red-100' : 'border-slate-200 focus:border-sky-400 focus:ring-sky-100'
            }`}
          />
          {error && <p className="text-xs text-red-500">{error}</p>}
        </div>
      );
    }

    function Textarea({ label, value, onChange, placeholder, rows = 3, disabled = false, className = '' }) {
      return (
        <div className={`flex flex-col gap-1 ${className}`}>
          {label && <label className="text-sm font-medium text-slate-700">{label}</label>}
          <textarea
            value={value}
            onChange={e => onChange(e.target.value)}
            placeholder={placeholder}
            rows={rows}
            disabled={disabled}
            className="px-3 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100 transition-all resize-none disabled:opacity-50"
          />
        </div>
      );
    }

    function Badge({ children, color = 'sky' }) {
      const theme = THEME_COLORS[color] || THEME_COLORS.sky;
      return (
        <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${theme.light} ${theme.text}`}>
          {children}
        </span>
      );
    }

    function ProfileAvatar({ name, color = 'sky', size = 'md' }) {
      const theme = THEME_COLORS[color] || THEME_COLORS.sky;
      const sizes = { sm: 'w-8 h-8 text-sm', md: 'w-12 h-12 text-lg', lg: 'w-16 h-16 text-2xl' };
      const initial = name ? name[0] : '?';
      return (
        <div className={`${sizes[size]} rounded-full bg-gradient-to-br ${theme.gradient} flex items-center justify-center text-white font-bold shadow-md flex-shrink-0`}>
          {initial}
        </div>
      );
    }

    // ========================================
    // 🧩 Profile Components
    // ========================================

    const PRESET_TEMPLATES = [
      {
        name: '심리상담사 지수',
        personality: '따뜻하고 공감 능력이 뛰어남. 비판하지 않고 경청함.',
        speakingStyle: '부드럽고 진심 어린 말투. 존댓말 사용.',
        expertise: '심리상담, 정서 지원, 스트레스 관리',
        description: '내담자가 스스로 감정을 탐색할 수 있도록 적절한 질문을 던집니다.',
        color: 'emerald',
      },
      {
        name: '법률 전문가 김변호사',
        personality: '냉철하고 논리적. 정확한 정보 전달을 중시함.',
        speakingStyle: '전문적이고 명확한 말투. 격식체 사용.',
        expertise: '민법, 형법, 노동법, 계약법',
        description: '법적 조언을 제공하되, 실제 소송은 전문 변호사와 상담을 권장합니다.',
        color: 'slate',
      },
      {
        name: '영어 선생님 Emily',
        personality: '긍정적이고 열정적. 학습자를 격려하는 스타일.',
        speakingStyle: '친근하고 활발한 말투. 한국어와 영어를 혼용.',
        expertise: '영어 회화, 문법, 발음 교정, TOEIC/TOEFL 준비',
        description: '틀린 표현은 부드럽게 교정해주고 올바른 표현을 알려줍니다.',
        color: 'amber',
      },
      {
        name: '재정 컨설턴트 박재무',
        personality: '신중하고 분석적. 리스크 관리를 중요하게 생각함.',
        speakingStyle: '차분하고 설득력 있는 말투. 쉬운 용어로 설명.',
        expertise: '주식, 부동산, 저축, 세금, 재정 계획',
        description: '투자 조언은 참고용이며 최종 결정은 본인 판단임을 명시합니다.',
        color: 'sky',
      },
      {
        name: '운동 트레이너 최강',
        personality: '활기차고 동기 부여를 잘 함. 할 수 있다는 마인드셋.',
        speakingStyle: '에너지 넘치고 격려하는 말투. 반말/존댓말 혼용.',
        expertise: '헬스, 다이어트, 식단, 홈트레이닝, 부상 예방',
        description: '개인 목표와 체력 수준에 맞는 맞춤형 조언을 드립니다.',
        color: 'rose',
      },
      {
        name: '요리사 이셰프',
        personality: '창의적이고 음식에 대한 열정이 넘침.',
        speakingStyle: '친근하고 유머러스한 말투. 요리 팁을 아낌없이 공유.',
        expertise: '한식, 양식, 일식, 제과제빵, 요리 기법',
        description: '레시피 제안부터 요리 기법까지 실용적인 조언을 드립니다.',
        color: 'violet',
      },
    ];

    function ProfileCard({ profile, onSelect, onEdit, onDelete, isSelected }) {
      const theme = THEME_COLORS[profile.color] || THEME_COLORS.sky;
      return (
        <div
          className={`bg-white rounded-2xl p-4 shadow-sm border-2 transition-all cursor-pointer hover:shadow-md slide-up ${
            isSelected ? `${theme.border} ring-2 ${theme.ring}` : 'border-transparent hover:border-slate-200'
          }`}
          onClick={() => onSelect(profile)}
        >
          <div className="flex items-start gap-3">
            <ProfileAvatar name={profile.name} color={profile.color} />
            <div className="flex-1 min-w-0">
              <div className="flex items-center justify-between gap-2">
                <h3 className="font-bold text-slate-800 truncate">{profile.name}</h3>
                <div className="flex gap-1 flex-shrink-0" onClick={e => e.stopPropagation()}>
                  <button onClick={() => onEdit(profile)} className="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                  </button>
                  <button onClick={() => onDelete(profile.id)} className="p-1.5 rounded-lg text-slate-400 hover:text-red-500 hover:bg-red-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                  </button>
                </div>
              </div>
              <div className="flex flex-wrap gap-1 mt-1.5">
                <Badge color={profile.color}>{profile.expertise.split(',')[0].trim()}</Badge>
              </div>
              <p className="text-xs text-slate-500 mt-1.5 line-clamp-2">{profile.personality}</p>
            </div>
          </div>
        </div>
      );
    }

    const COLOR_OPTIONS = ['emerald', 'violet', 'rose', 'amber', 'sky', 'slate'];

    function ProfileForm({ initial, onSave, onCancel }) {
      const [form, setForm] = useState(initial || {
        name: '', personality: '', speakingStyle: '', expertise: '', description: '', color: 'sky',
      });
      const [errors, setErrors] = useState({});

      const set = (key) => (val) => setForm(f => ({ ...f, [key]: val }));

      const validate = () => {
        const e = {};
        if (!form.name.trim()) e.name = '이름을 입력하세요.';
        if (!form.personality.trim()) e.personality = '성격을 입력하세요.';
        if (!form.speakingStyle.trim()) e.speakingStyle = '말투를 입력하세요.';
        if (!form.expertise.trim()) e.expertise = '전문분야를 입력하세요.';
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const handleSave = () => {
        if (!validate()) return;
        onSave({ ...form, id: form.id || Date.now().toString() });
      };

      return (
        <div className="bg-white rounded-2xl shadow-lg p-6 slide-up">
          <h2 className="text-lg font-bold text-slate-800 mb-4">{initial ? '프로필 수정' : '새 프로필 만들기'}</h2>
          <div className="space-y-3">
            <Input label="AI 이름 *" value={form.name} onChange={set('name')} placeholder="예: 마음이, 김변호사" error={errors.name} />
            <Textarea label="성격 *" value={form.personality} onChange={set('personality')} placeholder="예: 따뜻하고 공감 능력이 뛰어남. 비판하지 않고 경청함." rows={2} />
            {errors.personality && <p className="text-xs text-red-500 -mt-2">{errors.personality}</p>}
            <Input label="말투 *" value={form.speakingStyle} onChange={set('speakingStyle')} placeholder="예: 부드럽고 친근한 말투. 존댓말 사용." error={errors.speakingStyle} />
            <Input label="전문분야 *" value={form.expertise} onChange={set('expertise')} placeholder="예: 심리상담, 스트레스 관리, 정서 지원" error={errors.expertise} />
            <Textarea label="추가 설명 (선택)" value={form.description} onChange={set('description')} placeholder="AI가 어떻게 행동해야 하는지 추가로 설명해 주세요." rows={2} />

            <div>
              <label className="text-sm font-medium text-slate-700 block mb-2">테마 색상</label>
              <div className="flex gap-2">
                {COLOR_OPTIONS.map(c => {
                  const theme = THEME_COLORS[c];
                  return (
                    <button
                      key={c}
                      onClick={() => set('color')(c)}
                      className={`w-8 h-8 rounded-full bg-gradient-to-br ${theme.gradient} transition-all ${
                        form.color === c ? 'ring-2 ring-offset-2 ring-slate-400 scale-110' : 'hover:scale-105'
                      }`}
                    />
                  );
                })}
              </div>
            </div>
          </div>
          <div className="flex gap-2 mt-5">
            <Button onClick={handleSave} color={form.color} className="flex-1">저장</Button>
            <Button onClick={onCancel} variant="secondary" className="flex-1">취소</Button>
          </div>
        </div>
      );
    }

    // ========================================
    // 💬 Chat Components
    // ========================================

    function TypingIndicator({ color }) {
      const theme = THEME_COLORS[color] || THEME_COLORS.sky;
      return (
        <div className="flex items-end gap-2 msg-animate">
          <div className={`w-8 h-8 rounded-full bg-gradient-to-br ${theme.gradient} flex items-center justify-center text-white text-sm font-bold shadow-sm flex-shrink-0`}>
            {/* dot */}
          </div>
          <div className="bg-white border border-slate-200 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm">
            <div className="flex gap-1">
              <span className="w-2 h-2 bg-slate-400 rounded-full dot-1 inline-block"></span>
              <span className="w-2 h-2 bg-slate-400 rounded-full dot-2 inline-block"></span>
              <span className="w-2 h-2 bg-slate-400 rounded-full dot-3 inline-block"></span>
            </div>
          </div>
        </div>
      );
    }

    function ChatBubble({ message, profile }) {
      const isUser = message.role === 'user';
      const theme = THEME_COLORS[profile.color] || THEME_COLORS.sky;
      return (
        <div className={`flex items-end gap-2 msg-animate ${isUser ? 'flex-row-reverse' : ''}`}>
          {!isUser && <ProfileAvatar name={profile.name} color={profile.color} size="sm" />}
          {isUser && (
            <div className="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white text-xs font-bold shadow-sm flex-shrink-0">
              나
            </div>
          )}
          <div className={`max-w-[75%] px-4 py-3 rounded-2xl shadow-sm whitespace-pre-wrap leading-relaxed text-[15px] ${
            isUser
              ? 'bg-gradient-to-br from-blue-500 to-indigo-500 text-white rounded-br-sm'
              : `bg-white border border-slate-200 text-slate-700 rounded-bl-sm`
          }`}>
            {message.content}
          </div>
        </div>
      );
    }

    function ChatInput({ onSend, disabled }) {
      const [text, setText] = useState('');
      const textareaRef = useRef(null);

      const handleSubmit = useCallback(() => {
        const trimmed = text.trim();
        if (!trimmed || disabled) return;
        onSend(trimmed);
        setText('');
        if (textareaRef.current) textareaRef.current.style.height = 'auto';
      }, [text, disabled, onSend]);

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmit(); }
      };

      const handleInput = (e) => {
        setText(e.target.value);
        e.target.style.height = 'auto';
        e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
      };

      return (
        <div className="bg-white border-t border-slate-200 px-4 py-3">
          <div className="max-w-3xl mx-auto flex items-end gap-2">
            <textarea
              ref={textareaRef}
              value={text}
              onChange={handleInput}
              onKeyDown={handleKeyDown}
              placeholder="메시지를 입력하세요... (Shift+Enter: 줄바꿈)"
              rows={1}
              disabled={disabled}
              className="flex-1 resize-none rounded-2xl border border-slate-200 px-4 py-3 text-[15px] text-slate-700 placeholder-slate-400 focus:outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100 transition-all disabled:opacity-50"
            />
            <button
              onClick={handleSubmit}
              disabled={disabled || !text.trim()}
              className="w-11 h-11 rounded-full bg-gradient-to-br from-sky-400 to-blue-500 text-white flex items-center justify-center shadow-md hover:shadow-lg transition-all disabled:opacity-40 flex-shrink-0"
            >
              <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 19V5m0 0l-7 7m7-7l7 7" />
              </svg>
            </button>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 Page Components
    // ========================================

    function ProfileListPage({ profiles, selectedProfile, onSelect, onEdit, onDelete, onCreate, onStartChat }) {
      return (
        <div className="h-full flex flex-col">
          <header className="bg-white border-b border-slate-200 px-4 py-4 flex items-center justify-between shadow-sm">
            <div>
              <h1 className="text-xl font-bold text-slate-800">AI 프로필 채팅</h1>
              <p className="text-xs text-slate-500 mt-0.5">AI의 성격과 전문분야를 설정하고 대화하세요</p>
            </div>
            <Button onClick={onCreate} size="sm">
              <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />
              </svg>
              새 프로필
            </Button>
          </header>

          <div className="flex-1 overflow-y-auto p-4">
            <div className="max-w-2xl mx-auto space-y-3">
              {profiles.length === 0 ? (
                <div className="text-center py-16 text-slate-400">
                  <svg xmlns="http://www.w3.org/2000/svg" className="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                  <p className="text-sm">프로필이 없습니다. 새 프로필을 만들어보세요!</p>
                </div>
              ) : (
                profiles.map(p => (
                  <ProfileCard
                    key={p.id}
                    profile={p}
                    isSelected={selectedProfile?.id === p.id}
                    onSelect={onSelect}
                    onEdit={onEdit}
                    onDelete={onDelete}
                  />
                ))
              )}
            </div>
          </div>

          {selectedProfile && (
            <div className="bg-white border-t border-slate-200 px-4 py-3">
              <div className="max-w-2xl mx-auto flex items-center gap-3">
                <ProfileAvatar name={selectedProfile.name} color={selectedProfile.color} size="sm" />
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-semibold text-slate-800 truncate">{selectedProfile.name} 선택됨</p>
                  <p className="text-xs text-slate-500 truncate">{selectedProfile.expertise}</p>
                </div>
                <Button onClick={onStartChat} color={selectedProfile.color}>
                  대화 시작
                  <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" />
                  </svg>
                </Button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function ChatPage({ profile, onBack }) {
      const [messages, setMessages] = useState([]);
      const [loading, setLoading] = useState(false);
      const chatEndRef = useRef(null);
      const theme = THEME_COLORS[profile.color] || THEME_COLORS.sky;
      const greeted = useRef(false);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      // 채팅 시작 시 AI가 먼저 인사
      useEffect(() => {
        if (greeted.current) return;
        greeted.current = true;
        const fallback = `안녕하세요! 저는 ${profile.name}이에요 😊\n${profile.expertise} 분야에서 도움을 드릴 수 있어요.\n편하게 말씀해 주세요!`;
        setLoading(true);
        fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: [], profile, isGreeting: true }),
        })
          .then(r => r.json())
          .then(data => {
            setMessages([{ role: 'assistant', content: data.reply || fallback }]);
          })
          .catch(() => {
            setMessages([{ role: 'assistant', content: fallback }]);
          })
          .finally(() => setLoading(false));
      }, []);

      const sendMessage = useCallback(async (text) => {
        const userMsg = { role: 'user', content: text };
        const newMessages = [...messages, userMsg];
        setMessages(newMessages);
        setLoading(true);

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: newMessages, profile }),
          });
          const data = await res.json();
          if (data.error) {
            setMessages([...newMessages, { role: 'assistant', content: `오류가 발생했어요: ${data.error}` }]);
          } else {
            setMessages([...newMessages, { role: 'assistant', content: data.reply }]);
          }
        } catch (err) {
          setMessages([...newMessages, { role: 'assistant', content: '서버와 연결할 수 없어요. 서버가 실행 중인지 확인해 주세요.' }]);
        } finally {
          setLoading(false);
        }
      }, [messages, profile]);

      return (
        <div className="h-full flex flex-col">
          <header className={`bg-white border-b border-slate-200 px-4 py-3 flex items-center gap-3 shadow-sm`}>
            <button onClick={onBack} className="p-2 rounded-xl text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" />
              </svg>
            </button>
            <ProfileAvatar name={profile.name} color={profile.color} size="sm" />
            <div className="flex-1 min-w-0">
              <h2 className="font-bold text-slate-800 leading-tight">{profile.name}</h2>
              <p className={`text-xs ${theme.text} truncate`}>{profile.expertise}</p>
            </div>
            <button
              onClick={() => setMessages([])}
              className="p-2 rounded-xl text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors"
              title="대화 초기화"
            >
              <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
              </svg>
            </button>
          </header>

          <div className="flex-1 overflow-y-auto chat-scroll px-4 py-6">
            <div className="max-w-3xl mx-auto space-y-4">
              {messages.map((msg, i) => (
                <ChatBubble key={i} message={msg} profile={profile} />
              ))}
              {loading && <TypingIndicator color={profile.color} />}
              <div ref={chatEndRef} />
            </div>
          </div>

          <ChatInput onSend={sendMessage} disabled={loading} />
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    const STORAGE_KEY = 'ai-profile-chat-profiles';

    function loadProfiles() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : PRESET_TEMPLATES.map((t, i) => ({ ...t, id: `preset-${i}` }));
      } catch { return PRESET_TEMPLATES.map((t, i) => ({ ...t, id: `preset-${i}` })); }
    }

    function saveProfiles(profiles) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles)); } catch {}
    }

    function App() {
      const [view, setView] = useState('list'); // 'list' | 'form' | 'chat'
      const [profiles, setProfiles] = useState(loadProfiles);
      const [selectedProfile, setSelectedProfile] = useState(null);
      const [editingProfile, setEditingProfile] = useState(null);

      const updateProfiles = (next) => {
        setProfiles(next);
        saveProfiles(next);
      };

      const handleSaveProfile = (profile) => {
        const exists = profiles.find(p => p.id === profile.id);
        const next = exists
          ? profiles.map(p => p.id === profile.id ? profile : p)
          : [...profiles, profile];
        updateProfiles(next);
        setEditingProfile(null);
        setView('list');
      };

      const handleDeleteProfile = (id) => {
        if (!confirm('이 프로필을 삭제하시겠습니까?')) return;
        const next = profiles.filter(p => p.id !== id);
        updateProfiles(next);
        if (selectedProfile?.id === id) setSelectedProfile(null);
      };

      const handleEdit = (profile) => {
        setEditingProfile(profile);
        setView('form');
      };

      if (view === 'chat' && selectedProfile) {
        return (
          <div className="h-screen flex flex-col bg-slate-50">
            <ChatPage profile={selectedProfile} onBack={() => setView('list')} />
          </div>
        );
      }

      if (view === 'form') {
        return (
          <div className="h-screen overflow-y-auto bg-slate-50 p-4">
            <div className="max-w-2xl mx-auto">
              <ProfileForm
                initial={editingProfile}
                onSave={handleSaveProfile}
                onCancel={() => { setEditingProfile(null); setView('list'); }}
              />
            </div>
          </div>
        );
      }

      return (
        <div className="h-screen flex flex-col bg-slate-50">
          <ProfileListPage
            profiles={profiles}
            selectedProfile={selectedProfile}
            onSelect={setSelectedProfile}
            onEdit={handleEdit}
            onDelete={handleDeleteProfile}
            onCreate={() => { setEditingProfile(null); setView('form'); }}
            onStartChat={() => setView('chat')}
          />
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
