  <script>
    // TossPayments redirects to /payments/success (or /fail) with query params
    // BEFORE the hash — but our SPA is hash-routed. Rewrite the URL to a hash
    // route at the earliest moment, before the React app reads the location.
    (function () {
      var p = window.location.pathname;
      if (p === '/payments/success' || p === '/payments/fail') {
        var route = p === '/payments/success' ? '/payments/success' : '/payments/fail';
        var search = window.location.search || '';
        var newUrl = window.location.origin + '/#' + route + search;
        window.history.replaceState(null, '', newUrl);
      }
    })();
  </script>

    const RouterContext = createContext(null);

    function parseHash() {
      const h = (window.location.hash || '#/').replace(/^#/, '');
      const [path, query = ''] = h.split('?');
      const params = Object.fromEntries(new URLSearchParams(query));
      return { path: path.startsWith('/') ? path : '/' + path, query: params };
    }

    function matchRoute(routePath, currentPath) {
      const rp = routePath.split('/').filter(Boolean);
      const cp = currentPath.split('/').filter(Boolean);
      if (rp.length !== cp.length) return null;
      const params = {};
      for (let i = 0; i < rp.length; i++) {
        if (rp[i].startsWith(':')) params[rp[i].slice(1)] = decodeURIComponent(cp[i]);
        else if (rp[i] !== cp[i]) return null;
      }
      return params;
    }

    function Router({ children }) {
      const [route, setRoute] = useState(parseHash());
      useEffect(() => {
        const onHashChange = () => {
          setRoute(parseHash());
          window.scrollTo({ top: 0, behavior: 'instant' });
        };
        window.addEventListener('hashchange', onHashChange);
        if (!window.location.hash) window.location.hash = '#/';
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);
      return <RouterContext.Provider value={route}>{children}</RouterContext.Provider>;
    }

    const useRouter = () => useContext(RouterContext);

    function Link({ to, className = '', children, ...rest }) {

    const CartContext = createContext(null);

    function CartProvider({ children }) {
      const [items, setItems] = useState([]);
      const [hydrated, setHydrated] = useState(false);

      useEffect(() => {
        try {
          const raw = localStorage.getItem('lumiere_cart');
          if (raw) setItems(JSON.parse(raw));
        } catch {}
        setHydrated(true);
      }, []);

      useEffect(() => {
        if (!hydrated) return;
        try { localStorage.setItem('lumiere_cart', JSON.stringify(items)); } catch {}
      }, [items, hydrated]);

      const addToCart = useCallback((product, qty = 1) => {
        setItems(prev => {
          const existing = prev.find(it => it.id === product.id);
          if (existing) return prev.map(it => it.id === product.id ? { ...it, qty: it.qty + qty } : it);
          return [...prev, { id: product.id, slug: product.slug, name: product.name, price: product.price, image: product.image, qty }];
        });
      }, []);

      const updateQty = useCallback((id, qty) => {
        if (qty < 1) return;
        setItems(prev => prev.map(it => it.id === id ? { ...it, qty } : it));
      }, []);

      const removeFromCart = useCallback((id) => {
        setItems(prev => prev.filter(it => it.id !== id));
      }, []);

      const clearCart = useCallback(() => setItems([]), []);

      const count = items.reduce((s, it) => s + it.qty, 0);
      const subtotal = items.reduce((s, it) => s + it.price * it.qty, 0);
      const shippingFee = subtotal === 0 || subtotal >= 50000 ? 0 : 3000;
      const total = subtotal + shippingFee;

      return (
        <CartContext.Provider value={{ items, addToCart, updateQty, removeFromCart, clearCart, count, subtotal, shippingFee, total }}>
          {children}
        </CartContext.Provider>
      );
    }

    // ============================================================
    // 💳 Checkout (TossPayments 결제위젯)
    // ============================================================
    function CheckoutPage() {
      const { items, subtotal, shippingFee, total } = useCart();
      const [form, setForm] = useState({
        customer_name: '',
        customer_phone: '',
        customer_email: '',
        shipping_address: '',
      });
      const [phase, setPhase] = useState('form'); // 'form' | 'widget'
      const [order, setOrder] = useState(null);    // { id, toss_order_id, total_amount, ... }
      const [error, setError] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [paying, setPaying] = useState(false);

      const widgetsRef = useRef(null);
      const isRenderedRef = useRef(false);

      // Redirect back to cart if empty and we're still on the form step
      useEffect(() => {
        if (phase === 'form' && items.length === 0) {
          navigate('/cart');
        }
      }, [phase, items.length]);

      const updateField = (key) => (e) => setForm(f => ({ ...f, [key]: e.target.value }));

      const onCreateOrder = async (e) => {
        e.preventDefault();
        setError('');

        if (!form.customer_name.trim()) return setError('주문자 성함을 입력해주세요.');
        const phoneDigits = form.customer_phone.replace(/[^0-9]/g, '');
        if (phoneDigits.length < 9) return setError('연락처를 올바르게 입력해주세요.');
        if (!form.shipping_address.trim()) return setError('배송지 주소를 입력해주세요.');

        // Normalize phone to digits + hyphens only (server enforces /^[0-9-]+$/).
        const phoneClean = form.customer_phone.replace(/[^0-9-]/g, '');

        setSubmitting(true);
        try {
          const res = await fetch('/api/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              customer_name: form.customer_name.trim(),
              customer_phone: phoneClean,
              customer_email: form.customer_email.trim() || null,
              shipping_address: form.shipping_address.trim(),
              items: items.map(it => ({
                product_id: it.id, name: it.name, price: it.price, qty: it.qty, image: it.image,
              })),
            }),
          });
          const data = await res.json();
          if (!res.ok || !data.success) {
            setError(data.message || '주문 생성 중 오류가 발생했습니다.');
            return;
          }
          setOrder(data.data);
          setPhase('widget');
        } catch (err) {
          setError('서버에 연결할 수 없습니다. (' + err.message + ')');
        } finally {
          setSubmitting(false);
        }
      };

      // Initialize + render TossPayments widget ONCE when we enter 'widget' phase.
      useEffect(() => {
        if (phase !== 'widget' || !order) return;
        if (typeof window.TossPayments !== 'function') {
          setError('결제 모듈을 불러오지 못했습니다. 새로고침 후 다시 시도해주세요.');
          return;
        }

        let cancelled = false;
        (async () => {
          try {
            const tossPayments = window.TossPayments(TOSS_CLIENT_KEY);
            // Anonymous customerKey — no login in this shop.
            const widgets = tossPayments.widgets({
              customerKey: window.TossPayments.ANONYMOUS,
            });
            if (cancelled) return;
            widgetsRef.current = widgets;

            await widgets.setAmount({
              currency: 'KRW',
              value: Number(order.total_amount),
            });
            if (cancelled) return;

            if (!isRenderedRef.current) {
              await Promise.all([
                widgets.renderPaymentMethods({
                  selector: '#payment-method',
                  variantKey: 'DEFAULT',
                }),
                widgets.renderAgreement({
                  selector: '#agreement',
                  variantKey: 'AGREEMENT',
                }),
              ]);
              isRenderedRef.current = true;
            }
          } catch (err) {
            console.error('Toss widget init failed:', err);
            if (!cancelled) setError('결제창을 불러오지 못했습니다. (' + (err.message || 'unknown') + ')');
          }
        })();

        return () => { cancelled = true; };
      }, [phase, order]);

      const onRequestPayment = async () => {
        if (!widgetsRef.current || !order) return;
        setError('');
        setPaying(true);
        try {
          const firstName = items[0]?.name || '주문상품';
          const orderName = items.length > 1
            ? `${firstName} 외 ${items.length - 1}건`
            : firstName;

          await widgetsRef.current.requestPayment({
            orderId: order.toss_order_id,
            orderName,
            successUrl: window.location.origin + '/payments/success',
            failUrl: window.location.origin + '/payments/fail',
            customerEmail: form.customer_email.trim() || undefined,
            customerName: form.customer_name.trim(),
            customerMobilePhone: form.customer_phone.replace(/[^0-9]/g, '') || undefined,
          });
          // On success Toss redirects; this line is unlikely to run.
        } catch (err) {
          // Includes USER_CANCEL, INVALID_CARD_COMPANY, etc.
          if (err.code === 'USER_CANCEL') {
            setError('결제가 취소되었습니다.');
          } else {
            setError(err.message || '결제 요청 중 오류가 발생했습니다.');
          }
          setPaying(false);
        }
      };

      if (phase === 'form' && items.length === 0) {
        return null; // redirect effect will handle
      }

      return (
        <section className="max-w-5xl mx-auto px-6 py-12">
          <h1 className="font-serif text-4xl mb-3">결제</h1>
          <p className="text-ink/60 mb-10">
            {phase === 'form'
              ? '주문자 정보와 배송지를 입력해주세요.'
              : '결제 수단을 선택하고 약관에 동의해주세요.'}
          </p>

          <div className="grid lg:grid-cols-[1fr_360px] gap-10">
            <div className="space-y-6">
              {phase === 'form' && (
                <form onSubmit={onCreateOrder} className="bg-white rounded-2xl shadow-sm p-6 space-y-5">
                  <div className="font-serif text-xl mb-2">주문자 정보</div>
                  <Field label="성함" required>
                    <input type="text" value={form.customer_name} onChange={updateField('customer_name')}
                      className="w-full px-4 py-3 rounded-xl border border-ink/15 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none"
                      placeholder="홍길동" autoComplete="name" />
                  </Field>
                  <Field label="연락처" required>
                    <input type="tel" value={form.customer_phone} onChange={updateField('customer_phone')}
                      className="w-full px-4 py-3 rounded-xl border border-ink/15 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none"
                      placeholder="010-1234-5678" autoComplete="tel" />
                  </Field>
                  <Field label="이메일">
                    <input type="email" value={form.customer_email} onChange={updateField('customer_email')}
                      className="w-full px-4 py-3 rounded-xl border border-ink/15 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none"
                      placeholder="you@example.com" autoComplete="email" />
                  </Field>
                  <Field label="배송지 주소" required>
                    <textarea value={form.shipping_address} onChange={updateField('shipping_address')}
                      rows={3}
                      className="w-full px-4 py-3 rounded-xl border border-ink/15 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none resize-none"
                      placeholder="서울특별시 ○○구 ○○로 123, 101동 1001호" autoComplete="street-address" />
                  </Field>

                  {error && (
                    <div className="text-sm text-red-600 bg-red-50 border border-red-100 rounded-xl px-4 py-3">
                      {error}
                    </div>
                  )}

                  <div className="pt-2">
                    <Button variant="primary" size="lg" className="w-full" disabled={submitting}>
                      {submitting ? '주문 생성 중…' : '결제 수단 선택으로 이동'}
                    </Button>
                  </div>
                </form>
              )}

              {phase === 'widget' && (
                <div className="bg-white rounded-2xl shadow-sm p-6 space-y-4">
                  <div className="font-serif text-xl">결제 수단</div>
                  <div id="payment-method"></div>
                  <div className="font-serif text-xl mt-2">약관 동의</div>
                  <div id="agreement"></div>

                  {error && (
                    <div className="text-sm text-red-600 bg-red-50 border border-red-100 rounded-xl px-4 py-3">
                      {error}
                    </div>
                  )}

                  <div className="pt-2 flex flex-col sm:flex-row gap-3">
                    <Button variant="primary" size="lg" className="flex-1" onClick={onRequestPayment} disabled={paying}>
                      {paying ? '결제창 이동 중…' : `${fmtKRW(Number(order?.total_amount || total))} 결제하기`}
                    </Button>
                    <Button variant="secondary" size="lg" onClick={() => navigate('/cart')} disabled={paying}>
                      장바구니로 돌아가기
                    </Button>
                  </div>
                </div>
              )}
            </div>

            <aside className="h-fit bg-white rounded-2xl shadow-sm p-6 lg:sticky lg:top-24">
              <div className="font-serif text-xl mb-5">주문 요약</div>
              <ul className="space-y-3 mb-5">
                {items.map(it => (
                  <li key={it.id} className="flex gap-3 items-center text-sm">
                    <div className="w-12 h-12 flex-shrink-0 rounded-lg overflow-hidden bg-ink/5">
                      <ImgSafe src={it.image} alt={it.name} className="w-full h-full object-cover" />
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="truncate">{it.name}</div>
                      <div className="text-ink/50">수량 {it.qty}</div>
                    </div>
                    <div className="whitespace-nowrap">{fmtKRW(it.price * it.qty)}</div>
                  </li>
                ))}
              </ul>
              <dl className="space-y-2 text-sm border-t border-ink/10 pt-4">
                <div className="flex justify-between">
                  <dt className="text-ink/60">상품금액</dt>
                  <dd>{fmtKRW(subtotal)}</dd>
                </div>
                <div className="flex justify-between">
                  <dt className="text-ink/60">배송비</dt>
                  <dd>{shippingFee === 0 ? <span className="text-gold-dark">무료</span> : fmtKRW(shippingFee)}</dd>
                </div>
              </dl>
              <div className="my-4 border-t border-ink/10"></div>
              <div className="flex justify-between items-baseline">
                <div className="text-ink/60">총 결제금액</div>
                <div className="font-serif text-2xl">{fmtKRW(Number(order?.total_amount || total))}</div>
              </div>
              {order && (
                <div className="mt-4 text-xs text-ink/40">
                  주문번호 #{order.id}
                </div>
              )}
            </aside>
          </div>
        </section>
      );
    }

      return (
        <label className="block">
          <span className="block text-sm text-ink/70 mb-2">
            {label}{required && <span className="text-red-500 ml-1">*</span>}

    // ============================================================
    // ✅ Payment Success / Fail
    // ============================================================
    function PaymentSuccessPage() {
      const { query } = useRouter();
      const { clearCart } = useCart();
      const [status, setStatus] = useState('confirming'); // 'confirming' | 'ok' | 'error'
      const [message, setMessage] = useState('');
      const [data, setData] = useState(null);
      const ranRef = useRef(false);

      useEffect(() => {
        if (ranRef.current) return;
        ranRef.current = true;

        const { paymentKey, orderId, amount } = query;
        if (!paymentKey || !orderId || !amount) {
          setStatus('error');
          setMessage('필수 결제 정보가 누락되었습니다.');
          return;
        }

        (async () => {
          try {
            const res = await fetch('/api/payments/confirm', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ paymentKey, orderId, amount: Number(amount) }),
            });
            const json = await res.json();
            if (res.ok && json.success) {
              setData(json.data);
              setStatus('ok');
              // Only clear cart AFTER confirmed.
              clearCart();
            } else {
              setStatus('error');
              setMessage(json.message || '결제 승인에 실패했습니다.');
            }
          } catch (err) {
            setStatus('error');
            setMessage('서버와 통신할 수 없습니다. (' + err.message + ')');
          }
        })();
      }, []);

      if (status === 'confirming') {
        return (
          <section className="max-w-xl mx-auto px-6 py-24 text-center">
            <div className="text-5xl mb-5">⏳</div>
            <h1 className="font-serif text-3xl mb-3">결제 승인 처리 중…</h1>
            <p className="text-ink/60">잠시만 기다려주세요.</p>
          </section>
        );
      }

      if (status === 'error') {
        return (
          <section className="max-w-xl mx-auto px-6 py-24 text-center">
            <div className="text-5xl mb-5">⚠️</div>
            <h1 className="font-serif text-3xl mb-3">결제 승인 실패</h1>
            <p className="text-ink/60 mb-8">{message}</p>
            <div className="flex justify-center gap-3">
              <Link to="/cart"><Button variant="secondary" size="lg">장바구니로</Button></Link>
              <Link to="/"><Button variant="primary" size="lg">홈으로</Button></Link>
            </div>
          </section>
        );
      }

      const order = data?.order;
      return (
        <section className="max-w-xl mx-auto px-6 py-20 text-center">
          <div className="text-5xl mb-5">✨</div>
          <h1 className="font-serif text-4xl mb-3">결제가 완료되었습니다</h1>
          <p className="text-ink/60 mb-10">
            LUMIÈRE를 찾아주셔서 감사합니다.<br />
            주문하신 조명을 정성껏 준비해 보내드릴게요.
          </p>
          {order && (
            <div className="bg-white rounded-2xl shadow-sm p-6 text-left text-sm space-y-2 mb-10">
              <div className="flex justify-between">
                <span className="text-ink/50">주문번호</span>
                <span>#{order.id}</span>
              </div>
              <div className="flex justify-between">
                <span className="text-ink/50">결제금액</span>
                <span className="font-serif text-lg">{fmtKRW(Number(order.total_amount))}</span>
              </div>
              <div className="flex justify-between">
                <span className="text-ink/50">주문자</span>
                <span>{order.customer_name}</span>
              </div>
              <div className="flex justify-between gap-4">
                <span className="text-ink/50 whitespace-nowrap">배송지</span>
                <span className="text-right">{order.shipping_address}</span>
              </div>
            </div>
          )}
          <div className="flex justify-center gap-3">
            <Link to="/products"><Button variant="secondary" size="lg">계속 쇼핑하기</Button></Link>
            <Link to="/"><Button variant="primary" size="lg">홈으로</Button></Link>
          </div>
        </section>
      );
    }

    function PaymentFailPage() {
      const { query } = useRouter();
      const code = query.code || 'UNKNOWN';
      const message = query.message || '결제에 실패했습니다.';
      return (
        <section className="max-w-xl mx-auto px-6 py-24 text-center">
          <div className="text-5xl mb-5">😔</div>
          <h1 className="font-serif text-3xl mb-3">결제에 실패했습니다</h1>
          <p className="text-ink/70 mb-2">{decodeURIComponent(message)}</p>
          <p className="text-xs text-ink/40 mb-10">오류 코드: {code}</p>
          <div className="flex justify-center gap-3">
            <Link to="/cart"><Button variant="secondary" size="lg">장바구니로</Button></Link>
            <Link to="/checkout"><Button variant="primary" size="lg">다시 시도</Button></Link>
          </div>
        </section>
      );
    }

    function AboutPage() {
      return (
        <section className="max-w-3xl mx-auto px-6 py-16 md:py-20">
          <div className="text-xs tracking-[0.25em] uppercase text-gold-dark">Our Story</div>
          <h1 className="font-serif text-4xl md:text-5xl mt-3 leading-tight">단 하나의 빛을<br />골라 드립니다</h1>

          <div className="mt-12 aspect-[3/2] overflow-hidden rounded-2xl">
            <ImgSafe src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?w=1024&q=80&auto=format&fit=crop" alt="" className="w-full h-full object-cover" />
          </div>

          <div className="mt-12 space-y-6 text-ink/80 leading-relaxed">
            <p>
              <strong className="font-serif text-ink">LUMIÈRE</strong>는 2024년 서울에서 시작된 조명 큐레이션 스토어입니다.
              "좋은 빛 하나가 공간 전체의 공기를 바꾼다"는 믿음으로, 전 세계 디자이너와 제조사 수백 곳 중에서 우리가 직접 사용해보고
              진심으로 좋았던 제품만 소개합니다.
            </p>
            <p>
              우리는 카탈로그가 가득 찬 매장이 아니라, 신뢰할 수 있는 큐레이터 친구에 가까운 스토어가 되기를 바랐습니다.
              그래서 컬렉션은 매달 단 <strong>8~12개</strong>의 제품으로만 유지합니다. 수가 적은 대신, 각각이 공간과 계절, 조도 범위까지 고려해
              자신 있게 추천할 수 있는 것들입니다.
            </p>
            <p>
              모든 제품은 직접 점등해 색온도와 확산 패턴을 확인한 뒤에만 컬렉션에 추가됩니다. 조립·설치가 까다로운 제품은
              무상 설치 서비스로 함께 해결해 드리고, 사용 중 발생하는 전기·내구성 이슈는 1년간 무상 A/S로 책임집니다.
            </p>
            <p>
              완벽한 공간은 완벽한 가구로 만들어지지 않습니다. 오히려 해가 진 뒤 켜지는 단 하나의 따뜻한 불빛이 그 공간을 집으로 만들어 줍니다.
              당신의 공간을 완성할 그 빛, LUMIÈRE가 찾아 드릴게요.
            </p>
          </div>

          <div className="mt-14 text-center">
            <Link to="/products"><Button variant="gold" size="lg">컬렉션 둘러보기</Button></Link>
          </div>
        </section>
      );
    }

    // ============================================================
    // 🚀 App
    // ============================================================
    function Routes() {
      const { path } = useRouter();
      if (path === '/' || path === '') return <HomePage />;
      if (path === '/products') return <ProductsPage />;
      if (matchRoute('/product/:id', path)) return <ProductDetailPage />;
      if (path === '/cart') return <CartPage />;
      if (path === '/checkout') return <CheckoutPage />;
      if (path === '/payments/success') return <PaymentSuccessPage />;
      if (path === '/payments/fail') return <PaymentFailPage />;
      if (path === '/about') return <AboutPage />;
      return (
        <section className="max-w-4xl mx-auto px-6 py-24 text-center">
          <div className="font-serif text-3xl mb-3">페이지를 찾을 수 없습니다</div>
          <Link to="/" className="text-gold-dark hover:underline">홈으로 돌아가기</Link>
        </section>
      );
    }

    function App() {
      return (
        <Router>
          <CartProvider>
            <div className="min-h-screen flex flex-col">
              <Header />
              <main className="flex-1">
                <Routes />
              </main>
              <Footer />
            </div>
          </CartProvider>
        </Router>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
