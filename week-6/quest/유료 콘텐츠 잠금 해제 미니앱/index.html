<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📨 위클리 페이퍼 — 구독자 전용 뉴스레터</title>
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #0f0f12;
      min-height: 100vh;
      color: #e5e7eb;
      line-height: 1.55;
    }
    .app { max-width: 920px; margin: 0 auto; padding: 24px 20px 80px; }

    /* ---------- Header ---------- */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px;
      background: #1a1a20;
      border: 1px solid #2a2a32;
      border-radius: 14px;
      margin-bottom: 28px;
    }
    .brand { display: flex; gap: 10px; align-items: center; cursor: pointer; user-select: none; }
    .brand-emoji { font-size: 1.4rem; }
    .brand-text { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.4px; }
    .brand-tag { color: #9ca3af; font-size: 0.78rem; margin-left: 4px; }
    .nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .username { color: #fbbf24; font-weight: 700; }

    /* ---------- Buttons ---------- */
    .btn {
      padding: 9px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      transition: all 0.15s;
      letter-spacing: -0.2px;
    }
    .btn-primary { background: #fbbf24; color: #1a1a20; }
    .btn-primary:hover { background: #f59e0b; }
    .btn-primary:disabled { background: #4b5563; color: #9ca3af; cursor: not-allowed; }
    .btn-ghost { background: #2a2a32; color: #e5e7eb; }
    .btn-ghost:hover { background: #3a3a42; }
    .btn-link {
      background: none; border: none; padding: 4px 6px;
      color: #fbbf24; font-weight: 700;
      cursor: pointer;
      text-decoration: underline; text-underline-offset: 2px;
    }
    .btn-link:hover { color: #f59e0b; }

    /* ---------- Cards & Forms ---------- */
    .card {
      background: #1a1a20;
      border: 1px solid #2a2a32;
      border-radius: 14px;
      padding: 28px;
    }
    h2 {
      font-size: 1.2rem;
      margin-bottom: 18px;
      letter-spacing: -0.3px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 6px;
      font-weight: 600;
      color: #9ca3af;
    }
    input, textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid #2a2a32;
      background: #14141a;
      color: #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #fbbf24;
      box-shadow: 0 0 0 3px rgba(251,191,36,0.15);
    }
    form { display: grid; gap: 14px; }
    .auth-wrap { max-width: 420px; margin: 40px auto 0; }
    .auth-switch {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #2a2a32;
      text-align: center;
      font-size: 0.9rem;
      color: #9ca3af;
    }

    /* ---------- Messages ---------- */
    .msg { padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 12px; }
    .msg-error { background: rgba(248,113,113,0.12); color: #fca5a5; border: 1px solid rgba(248,113,113,0.25); }
    .msg-success { background: rgba(74,222,128,0.12); color: #86efac; border: 1px solid rgba(74,222,128,0.25); }
    .msg-info { background: rgba(96,165,250,0.12); color: #93c5fd; border: 1px solid rgba(96,165,250,0.25); }

    /* ---------- Hero / List ---------- */
    .hero {
      padding: 36px 28px;
      background: linear-gradient(135deg, #18181f 0%, #20202a 100%);
      border: 1px solid #2a2a32;
      border-radius: 16px;
      margin-bottom: 22px;
      text-align: center;
    }
    .hero-title {
      font-size: 1.8rem; font-weight: 900;
      letter-spacing: -0.6px; margin-bottom: 8px;
    }
    .hero-sub { color: #9ca3af; font-size: 0.96rem; }
    .hero-tag {
      display: inline-block; margin-bottom: 14px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(251,191,36,0.14);
      color: #fbbf24;
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.4px;
    }

    .content-list { display: grid; gap: 14px; }
    .content-card {
      background: #1a1a20;
      border: 1px solid #2a2a32;
      border-radius: 14px;
      padding: 22px 24px;
      cursor: pointer;
      transition: all 0.15s;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
    }
    .content-card:hover {
      border-color: #fbbf24;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(251,191,36,0.10);
    }
    .content-meta {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 8px;
    }
    .issue-label {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(251,191,36,0.14);
      color: #fbbf24;
      font-size: 0.74rem; font-weight: 700;
    }
    .purchased-label {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(74,222,128,0.18);
      color: #86efac;
      font-size: 0.74rem; font-weight: 700;
    }
    .content-title {
      font-size: 1.12rem; font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.3px; color: #f5f5f5;
    }
    .content-preview {
      color: #9ca3af;
      font-size: 0.92rem;
      white-space: pre-line;
      margin-bottom: 4px;
      max-height: 4.5em;
      overflow: hidden;
    }
    .content-price {
      font-size: 1.1rem; font-weight: 800;
      color: #fbbf24; min-width: 90px; text-align: right;
      white-space: nowrap;
    }
    .content-price-free { color: #86efac; }

    /* ---------- Detail ---------- */
    .detail-head {
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid #2a2a32;
    }
    .detail-title {
      font-size: 1.6rem; font-weight: 900;
      letter-spacing: -0.5px; margin: 8px 0 6px;
      line-height: 1.3;
    }
    .detail-meta { color: #9ca3af; font-size: 0.85rem; }

    .article {
      font-size: 1rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: keep-all;
    }
    .article h1 {
      font-size: 1.5rem; font-weight: 800; margin: 20px 0 12px;
      letter-spacing: -0.3px;
    }
    .article h2 {
      font-size: 1.2rem; font-weight: 800;
      margin: 22px 0 10px;
      color: #fbbf24;
      letter-spacing: -0.2px;
    }
    .article h3 {
      font-size: 1.05rem; font-weight: 700;
      margin: 16px 0 8px;
      color: #f3f4f6;
    }
    .article p { margin: 8px 0; }
    .article strong { color: #fde68a; }

    /* ---------- Lock ---------- */
    .preview-block {
      padding: 18px 22px;
      background: #14141a;
      border-radius: 12px;
      margin-bottom: 16px;
      white-space: pre-line;
      color: #d4d4d8;
      font-size: 0.95rem;
      line-height: 1.65;
    }
    .lock-box {
      position: relative;
      margin-top: 16px;
      padding: 24px 22px;
      background: linear-gradient(180deg, #18181f, #14141a);
      border: 1px dashed #4b5563;
      border-radius: 12px;
      overflow: hidden;
    }
    .lock-blurred {
      filter: blur(6px);
      user-select: none;
      pointer-events: none;
      color: #6b7280;
      max-height: 200px;
      overflow: hidden;
      white-space: pre-line;
      line-height: 1.7;
      mask-image: linear-gradient(to bottom, #000 60%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, #000 60%, transparent);
    }
    .lock-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      text-align: center;
      padding: 20px;
      background: linear-gradient(180deg, rgba(20,20,26,0.4) 0%, rgba(20,20,26,0.95) 70%);
    }
    .lock-emoji { font-size: 2.6rem; }
    .lock-title { font-size: 1.05rem; font-weight: 800; color: #fbbf24; }
    .lock-desc { color: #9ca3af; font-size: 0.88rem; max-width: 320px; }
    .lock-cta { margin-top: 8px; }

    /* ---------- Checkout / Toss ---------- */
    .checkout-summary {
      padding: 18px 20px;
      background: #14141a;
      border: 1px solid #2a2a32;
      border-radius: 12px;
      margin-bottom: 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .checkout-summary .left { color: #9ca3af; font-size: 0.88rem; }
    .checkout-summary .total { font-size: 1.4rem; font-weight: 800; color: #fbbf24; }

    /* ---------- Empty / Loading ---------- */
    .empty {
      text-align: center;
      color: #6b7280;
      padding: 50px 20px;
      border: 1px dashed #2a2a32;
      border-radius: 14px;
    }
    .empty-emoji { font-size: 2.6rem; margin-bottom: 8px; }

    /* ---------- Toast ---------- */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #fbbf24; color: #1a1a20;
      padding: 10px 20px; border-radius: 999px;
      font-size: 0.9rem; font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      opacity: 0; transition: opacity 0.25s;
      pointer-events: none;
      z-index: 9999;
    }
    .toast.show { opacity: 1; }

    /* ---------- Purchase history ---------- */
    .purchase-card {
      background: #1a1a20;
      border: 1px solid #2a2a32;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .purchase-card .head {
      display: flex; gap: 8px; align-items: center;
      flex-wrap: wrap; margin-bottom: 6px;
    }
    .purchase-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.72rem; font-weight: 700;
    }
    .status-confirmed { background: rgba(74,222,128,0.18); color: #86efac; }
    .status-pending { background: rgba(251,191,36,0.18); color: #fde68a; }
    .purchase-title {
      font-weight: 700; color: #f5f5f5;
      font-size: 0.98rem; margin-bottom: 4px;
    }
    .purchase-meta { color: #9ca3af; font-size: 0.78rem; }

    @media (max-width: 640px) {
      .app { padding: 16px 12px; }
      header { padding: 12px 14px; flex-wrap: wrap; gap: 10px; }
      .brand-text { font-size: 1rem; }
      .content-card { grid-template-columns: 1fr; }
      .content-price { text-align: left; }
      .hero { padding: 24px 18px; }
      .hero-title { font-size: 1.4rem; }
      .checkout-summary { flex-direction: column; align-items: flex-start; gap: 4px; }
      .purchase-card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand" id="homeBtn">
        <span class="brand-emoji">📨</span>
        <div>
          <div class="brand-text">위클리 페이퍼<span class="brand-tag">유료 뉴스레터</span></div>
        </div>
      </div>
      <div class="nav" id="navArea"></div>
    </header>

    <main id="main"></main>
  </div>

  <div class="toast" id="toast"></div>

  <!-- 콘텐츠 목록 -->
  <template id="tpl-list">
    <div>
      <div class="hero">
        <div class="hero-tag">CURATED · WEEKLY</div>
        <h1 class="hero-title">현장에서 길어 올린, 이번 주의 인사이트</h1>
        <div class="hero-sub">
          이번 주 호는 구독자만 — 결제하시면 즉시 본문 전체가 열립니다.<br/>
          한 번 결제한 콘텐츠는 언제든 다시 열람할 수 있어요.
        </div>
      </div>
      <div id="contentList" class="content-list"></div>
    </div>
  </template>

  <!-- 콘텐츠 상세 -->
  <template id="tpl-detail">
    <div class="card">
      <div id="detailBody"></div>
    </div>
  </template>

  <!-- 결제 페이지 -->
  <template id="tpl-checkout">
    <div class="card">
      <div id="checkoutMsg"></div>
      <h2 id="checkoutTitle">💳 결제</h2>
      <div id="checkoutSummary"></div>
      <h2 style="margin-top: 22px;">결제 수단 선택</h2>
      <div id="payment-method"></div>
      <div id="agreement"></div>
      <div style="margin-top: 18px;">
        <button type="button" class="btn btn-primary" id="payNowBtn" style="width:100%;">
          결제하고 열람하기
        </button>
      </div>
    </div>
  </template>

  <!-- 결제 성공 -->
  <template id="tpl-payment-success">
    <div class="card" style="max-width:560px; margin: 40px auto 0; text-align:center;">
      <div style="font-size: 3.6rem; margin-bottom: 10px;">🎉</div>
      <h2 style="font-size: 1.3rem;">결제가 완료되었습니다</h2>
      <div id="paymentSuccessBody" style="margin-top: 16px;"></div>
    </div>
  </template>

  <!-- 결제 실패 -->
  <template id="tpl-payment-fail">
    <div class="card" style="max-width:560px; margin: 40px auto 0; text-align:center;">
      <div style="font-size: 3.6rem; margin-bottom: 10px;">😢</div>
      <h2 style="font-size: 1.3rem;">결제에 실패했습니다</h2>
      <div id="paymentFailBody" style="margin-top: 12px; color: #9ca3af;"></div>
      <div style="margin-top: 18px;">
        <button class="btn btn-primary" id="backHomeBtn">홈으로</button>
      </div>
    </div>
  </template>

  <!-- 구매 이력 -->
  <template id="tpl-purchases">
    <div class="card">
      <h2>📚 내 구매 이력</h2>
      <p style="color:#9ca3af; font-size:0.88rem; margin-bottom: 18px;">
        한 번 결제한 콘텐츠는 언제든 다시 열람할 수 있어요.
      </p>
      <div id="purchasesBody"></div>
    </div>
  </template>

  <!-- 로그인 -->
  <template id="tpl-login">
    <div class="auth-wrap">
      <div class="card">
        <h2 style="text-align:center;">🔐 로그인</h2>
        <div id="authMsg"></div>
        <form id="loginForm">
          <div>
            <label>이메일</label>
            <input type="email" name="email" required autocomplete="email" />
          </div>
          <div>
            <label>비밀번호</label>
            <input type="password" name="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;">로그인</button>
        </form>
        <div class="auth-switch">
          처음이신가요?
          <button type="button" class="btn-link" id="goRegister">회원가입</button>
        </div>
      </div>
    </div>
  </template>

  <!-- 회원가입 -->
  <template id="tpl-register">
    <div class="auth-wrap">
      <div class="card">
        <h2 style="text-align:center;">✨ 회원가입</h2>
        <div id="authMsg"></div>
        <form id="registerForm">
          <div>
            <label>이메일</label>
            <input type="email" name="email" required autocomplete="email" />
          </div>
          <div>
            <label>이름</label>
            <input type="text" name="name" required maxlength="30" placeholder="구독 시 표시될 이름" />
          </div>
          <div>
            <label>비밀번호 <span style="color:#6b7280; font-weight:400;">(6자 이상)</span></label>
            <input type="password" name="password" required minlength="6" autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;">가입하고 시작하기</button>
        </form>
        <div class="auth-switch">
          이미 계정이 있으신가요?
          <button type="button" class="btn-link" id="goLogin">로그인</button>
        </div>
      </div>
    </div>
  </template>

  <script src="/client.js"></script>
</body>
</html>
