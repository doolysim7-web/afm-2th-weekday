<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>간단한 메모장</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Custom scrollbar for memo list */
    .memo-scroll::-webkit-scrollbar { width: 8px; }
    .memo-scroll::-webkit-scrollbar-track { background: transparent; }
    .memo-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .memo-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    const API_BASE_URL = '/api';

    // Resolve a stored image URL into something the browser can always load.
    // Some legacy URLs contain NFD Hangul (macOS filenames) that ImageKit
    // serves only when fetched with the exact NFD bytes. To avoid environment-
    // specific URL normalization (Vercel CDN, non-macOS browsers), route any
    // non-ASCII URL through the server-side image proxy.
    function resolveImageSrc(url) {
      if (!url) return url;
      const isAscii = /^[\x00-\x7F]*$/.test(url);
      if (isAscii) return url;
      return `${API_BASE_URL}/image-proxy?url=${encodeURIComponent(url)}`;
    }

    // ========================================
    // 🛰 ImageKit Uploader
    // ========================================

    // Sanitize filename so the resulting ImageKit URL is ASCII-only.
    // macOS uses NFD (decomposed) Hangul in filenames — when the URL is
    // requested from a different environment that normalizes to NFC, the
    // path no longer matches what ImageKit stored and returns 404.
    function sanitizeFileName(name) {
      const dot = name.lastIndexOf('.');
      const base = dot > 0 ? name.slice(0, dot) : name;
      const ext = dot > 0 ? name.slice(dot) : '';
      const safeBase =
        base
          .normalize('NFC')
          .replace(/[^A-Za-z0-9._-]+/g, '-')
          .replace(/-+/g, '-')
          .replace(/^-|-$/g, '') || 'file';
      const safeExt = ext.replace(/[^A-Za-z0-9.]+/g, '');
      return safeBase + safeExt;
    }

    async function uploadToImageKit(file, { folder = '/memo-app' } = {}) {
      const authRes = await fetch(`${API_BASE_URL}/imagekit-auth`);
      const authJson = await authRes.json();
      if (!authJson.success) throw new Error(authJson.message || '인증 실패');
      const { token, expire, signature, publicKey } = authJson.data;

      const form = new FormData();
      form.append('file', file);
      form.append('fileName', sanitizeFileName(file.name));
      form.append('publicKey', publicKey);
      form.append('token', token);
      form.append('expire', String(expire));
      form.append('signature', signature);
      form.append('useUniqueFileName', 'true');
      if (folder) form.append('folder', folder);

      const uploadRes = await fetch('https://upload.imagekit.io/api/v1/files/upload', {
        method: 'POST',
        body: form,
      });
      const uploadJson = await uploadRes.json();
      if (!uploadRes.ok) {
        throw new Error(uploadJson.message || `업로드 실패 (${uploadRes.status})`);
      }
      return uploadJson;
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({
      variant = 'primary',
      size = 'md',
      disabled = false,
      onClick,
      children,
      className = '',
      type = 'button',
      ...rest
    }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-indigo-600 hover:bg-indigo-700 text-white focus:ring-indigo-500',
        secondary: 'bg-slate-200 hover:bg-slate-300 text-slate-800 focus:ring-slate-400',
        danger: 'bg-red-600 hover:bg-red-700 text-white focus:ring-red-500',
        ghost: 'bg-transparent hover:bg-slate-100 text-slate-700 focus:ring-slate-300',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2 text-sm',
        lg: 'px-6 py-3 text-base',
      };
      return (
        <button
          type={type}
          disabled={disabled}
          onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Input({ label, error, className = '', ...rest }) {
      return (
        <div className="w-full">
          {label && (
            <label className="block text-sm font-medium text-slate-700 mb-1">{label}</label>
          )}
          <input
            className={`w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 ${
              error ? 'border-red-400' : 'border-slate-300'
            } ${className}`}
            {...rest}
          />
          {error && <p className="text-xs text-red-600 mt-1">{error}</p>}
        </div>
      );
    }

    function Textarea({ label, error, className = '', ...rest }) {
      return (
        <div className="w-full flex flex-col">
          {label && (
            <label className="block text-sm font-medium text-slate-700 mb-1">{label}</label>
          )}
          <textarea
            className={`w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none ${
              error ? 'border-red-400' : 'border-slate-300'
            } ${className}`}
            {...rest}
          />
          {error && <p className="text-xs text-red-600 mt-1">{error}</p>}
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-md ${className}`}>
          {children}
        </div>
      );
    }

    // ========================================
    // 🛠 Utilities
    // ========================================

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      const now = new Date();
      const sameDay =
        d.getFullYear() === now.getFullYear() &&
        d.getMonth() === now.getMonth() &&
        d.getDate() === now.getDate();
      const pad = (n) => String(n).padStart(2, '0');
      if (sameDay) {
        return `오늘 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }
      return `${d.getFullYear()}.${pad(d.getMonth() + 1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function previewText(content) {
      const s = (content || '').replace(/\s+/g, ' ').trim();
      return s.length > 60 ? s.slice(0, 60) + '…' : s;
    }

    // ========================================
    // 🧩 Layout: Header
    // ========================================

    function Header({ onNew, count }) {
      return (
        <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
          <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center text-white text-lg">
                📝
              </div>
              <div>
                <h1 className="text-lg font-bold text-slate-800 leading-tight">간단한 메모장</h1>
                <p className="text-xs text-slate-500">메모 {count}개</p>
              </div>
            </div>
            <Button onClick={onNew} size="md">+ 새 메모</Button>
          </div>
        </header>
      );
    }

    // ========================================
    // 🧩 MemoList
    // ========================================

    function MemoList({ memos, selectedId, onSelect, loading, query, onQueryChange }) {
      return (
        <aside className="w-full md:w-80 shrink-0 md:border-r border-slate-200 bg-white md:h-[calc(100vh-64px)] flex flex-col">
          <div className="p-3 border-b border-slate-200">
            <Input
              placeholder="검색..."
              value={query}
              onChange={(e) => onQueryChange(e.target.value)}
            />
          </div>
          <div className="memo-scroll flex-1 overflow-y-auto">
            {loading ? (
              <div className="p-6 text-center text-sm text-slate-500">불러오는 중...</div>
            ) : memos.length === 0 ? (
              <div className="p-6 text-center text-sm text-slate-500">
                {query ? '검색 결과가 없습니다.' : '아직 메모가 없습니다.'}
              </div>
            ) : (
              <ul className="divide-y divide-slate-100">
                {memos.map((m) => {
                  const active = m.id === selectedId;
                  return (
                    <li key={m.id}>
                      <button
                        onClick={() => onSelect(m.id)}
                        className={`w-full text-left px-4 py-3 transition-colors ${
                          active ? 'bg-indigo-50' : 'hover:bg-slate-50'
                        }`}
                      >
                        <div className="flex items-center justify-between gap-2">
                          <h3 className={`font-medium truncate ${active ? 'text-indigo-700' : 'text-slate-800'}`}>
                            {m.title?.trim() || '(제목 없음)'}
                          </h3>
                          {m.image_url && <span className="text-xs shrink-0" title="이미지 첨부됨">🖼</span>}
                        </div>
                        <p className="text-xs text-slate-500 mt-1 truncate">
                          {previewText(m.content) || '(내용 없음)'}
                        </p>
                        <p className="text-[11px] text-slate-400 mt-1">
                          {formatDate(m.updated_at || m.created_at)}
                        </p>
                      </button>
                    </li>
                  );
                })}
              </ul>
            )}
          </div>
        </aside>
      );
    }

    // ========================================
    // 🧩 MemoEditor
    // ========================================

    function MemoEditor({ memo, onSave, onDelete, saving, error }) {
      const [title, setTitle] = useState(memo?.title || '');
      const [content, setContent] = useState(memo?.content || '');
      const [imageUrl, setImageUrl] = useState(memo?.image_url || null);
      const [imageUploading, setImageUploading] = useState(false);
      const [imageError, setImageError] = useState(null);
      const [imageLoadFailed, setImageLoadFailed] = useState(false);
      const fileInputRef = useRef(null);

      useEffect(() => {
        setTitle(memo?.title || '');
        setContent(memo?.content || '');
        setImageUrl(memo?.image_url || null);
        setImageError(null);
        setImageLoadFailed(false);
        if (fileInputRef.current) fileInputRef.current.value = '';
      }, [memo?.id]);

      // Reset broken-image state whenever the URL changes (e.g. re-upload).
      useEffect(() => {
        setImageLoadFailed(false);
      }, [imageUrl]);

      const dirty =
        (memo?.title || '') !== title ||
        (memo?.content || '') !== content ||
        (memo?.image_url || null) !== imageUrl;

      const handleSave = () => {
        onSave({ title, content, imageUrl });
      };

      const handleKeyDown = (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 's') {
          e.preventDefault();
          if (dirty && !saving) handleSave();
        }
      };

      const handlePickImage = () => {
        fileInputRef.current?.click();
      };

      const handleImageChange = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
          setImageError('이미지 파일만 업로드할 수 있습니다.');
          e.target.value = '';
          return;
        }
        setImageUploading(true);
        setImageError(null);
        try {
          const result = await uploadToImageKit(file, { folder: '/memo-app' });
          setImageUrl(result.url);
        } catch (err) {
          setImageError(err.message || '업로드 실패');
        } finally {
          setImageUploading(false);
          if (fileInputRef.current) fileInputRef.current.value = '';
        }
      };

      const handleRemoveImage = () => {
        setImageUrl(null);
        setImageError(null);
      };

      return (
        <section className="flex-1 flex flex-col md:h-[calc(100vh-64px)] bg-slate-50" onKeyDown={handleKeyDown}>
          <div className="flex items-center justify-between gap-2 px-4 py-3 border-b border-slate-200 bg-white">
            <div className="text-xs text-slate-500">
              {memo?.id
                ? `수정: ${formatDate(memo.updated_at)} · 생성: ${formatDate(memo.created_at)}`
                : '새 메모'}
              {dirty && <span className="ml-2 text-amber-600">● 저장되지 않음</span>}
            </div>
            <div className="flex items-center gap-2">
              {memo?.id && (
                <Button variant="danger" size="sm" onClick={onDelete} disabled={saving}>
                  삭제
                </Button>
              )}
              <Button onClick={handleSave} disabled={saving || !dirty || imageUploading} size="sm">
                {saving ? '저장 중...' : memo?.id ? '저장' : '만들기'}
              </Button>
            </div>
          </div>

          {error && (
            <div className="mx-4 mt-3 rounded-lg bg-red-50 border border-red-200 p-3 text-sm text-red-700">
              <span className="font-medium">오류:</span> {error}
            </div>
          )}

          <div className="flex-1 flex flex-col gap-3 p-4 overflow-y-auto memo-scroll">
            <Input
              placeholder="제목을 입력하세요"
              value={title}
              onChange={(e) => setTitle(e.target.value)}
              className="text-lg"
              maxLength={200}
            />
            <Textarea
              placeholder="내용을 입력하세요..."
              value={content}
              onChange={(e) => setContent(e.target.value)}
              className="min-h-[200px]"
            />

            {/* Image attachment */}
            <div className="rounded-xl bg-white border border-slate-200 p-3">
              <input
                ref={fileInputRef}
                type="file"
                accept="image/*"
                onChange={handleImageChange}
                className="hidden"
              />
              {imageUrl ? (
                <div className="space-y-2">
                  <div className="rounded-lg overflow-hidden bg-slate-100 border border-slate-200 relative">
                    <img
                      src={resolveImageSrc(imageUrl)}
                      alt="첨부 이미지"
                      onLoad={() => setImageLoadFailed(false)}
                      onError={() => setImageLoadFailed(true)}
                      className={`w-full max-h-80 object-contain bg-slate-50 ${imageLoadFailed ? 'opacity-30' : ''}`}
                    />
                    {imageLoadFailed && (
                      <div className="absolute inset-0 flex items-center justify-center text-center px-4">
                        <p className="text-sm text-red-600 bg-white/80 rounded-lg px-3 py-2">
                          이미지 로드 실패 — 파일명에 한글/특수문자가 포함된 이전 업로드일 수 있습니다.<br/>
                          <span className="text-xs text-slate-500">"변경" 버튼으로 다시 업로드해 주세요.</span>
                        </p>
                      </div>
                    )}
                  </div>
                  <div className="flex items-center justify-between gap-2">
                    <a
                      href={imageUrl}
                      target="_blank"
                      rel="noreferrer"
                      className="text-xs text-slate-500 truncate underline underline-offset-2 hover:text-indigo-600"
                    >
                      {imageUrl}
                    </a>
                    <div className="flex gap-2 shrink-0">
                      <Button variant="ghost" size="sm" onClick={handlePickImage} disabled={imageUploading || saving}>
                        변경
                      </Button>
                      <Button variant="danger" size="sm" onClick={handleRemoveImage} disabled={imageUploading || saving}>
                        제거
                      </Button>
                    </div>
                  </div>
                </div>
              ) : (
                <div className="flex items-center justify-between gap-3">
                  <div className="flex items-center gap-2 text-sm text-slate-600">
                    <span className="text-lg">🖼</span>
                    <span>{imageUploading ? '업로드 중...' : '이미지 첨부 (선택)'}</span>
                  </div>
                  <Button variant="secondary" size="sm" onClick={handlePickImage} disabled={imageUploading || saving}>
                    {imageUploading ? '업로드 중...' : '이미지 첨부'}
                  </Button>
                </div>
              )}
              {imageError && (
                <p className="text-xs text-red-600 mt-2">{imageError}</p>
              )}
            </div>

            <p className="text-xs text-slate-400 text-right">
              {title.length}/200 · {content.length}자 · ⌘/Ctrl+S 로 저장
            </p>
          </div>
        </section>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================

    function App() {
      const [memos, setMemos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedId, setSelectedId] = useState(null);
      const [draft, setDraft] = useState(null); // { title, content } for a new (unsaved) memo
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState(null);
      const [query, setQuery] = useState('');

      const loadMemos = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const res = await fetch(`${API_BASE_URL}/memos`);
          const json = await res.json();
          if (!json.success) throw new Error(json.message || '불러오기 실패');
          setMemos(json.data || []);
        } catch (err) {
          setError(err.message || '알 수 없는 오류');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        loadMemos();
      }, [loadMemos]);

      const filteredMemos = useMemo(() => {
        const q = query.trim().toLowerCase();
        if (!q) return memos;
        return memos.filter((m) =>
          (m.title || '').toLowerCase().includes(q) ||
          (m.content || '').toLowerCase().includes(q)
        );
      }, [memos, query]);

      const selectedMemo = useMemo(() => {
        if (draft) return draft;
        return memos.find((m) => m.id === selectedId) || null;
      }, [draft, memos, selectedId]);

      const handleNew = () => {
        setDraft({ title: '', content: '' });
        setSelectedId(null);
        setError(null);
      };

      const handleSelect = (id) => {
        setDraft(null);
        setSelectedId(id);
        setError(null);
      };

      const handleSave = async ({ title, content, imageUrl }) => {
        setSaving(true);
        setError(null);
        try {
          const payload = { title, content, imageUrl: imageUrl || null };
          if (draft && !draft.id) {
            const res = await fetch(`${API_BASE_URL}/memos`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            const json = await res.json();
            if (!json.success) throw new Error(json.message || '생성 실패');
            setDraft(null);
            setSelectedId(json.data.id);
            await loadMemos();
          } else if (selectedMemo?.id) {
            const res = await fetch(`${API_BASE_URL}/memos/${selectedMemo.id}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            const json = await res.json();
            if (!json.success) throw new Error(json.message || '저장 실패');
            await loadMemos();
          }
        } catch (err) {
          setError(err.message || '알 수 없는 오류');
        } finally {
          setSaving(false);
        }
      };

      const handleDelete = async () => {
        if (!selectedMemo?.id) return;
        if (!confirm('이 메모를 삭제할까요?')) return;
        setSaving(true);
        setError(null);
        try {
          const res = await fetch(`${API_BASE_URL}/memos/${selectedMemo.id}`, {
            method: 'DELETE',
          });
          const json = await res.json();
          if (!json.success) throw new Error(json.message || '삭제 실패');
          setSelectedId(null);
          setDraft(null);
          await loadMemos();
        } catch (err) {
          setError(err.message || '알 수 없는 오류');
        } finally {
          setSaving(false);
        }
      };

      return (
        <div className="min-h-screen">
          <Header onNew={handleNew} count={memos.length} />
          <main className="max-w-6xl mx-auto md:flex">
            <MemoList
              memos={filteredMemos}
              selectedId={selectedId}
              onSelect={handleSelect}
              loading={loading}
              query={query}
              onQueryChange={setQuery}
            />
            {selectedMemo ? (
              <MemoEditor
                memo={selectedMemo}
                onSave={handleSave}
                onDelete={handleDelete}
                saving={saving}
                error={error}
              />
            ) : (
              <section className="flex-1 flex items-center justify-center md:h-[calc(100vh-64px)] bg-slate-50">
                <div className="text-center px-6">
                  <div className="text-5xl mb-3">📝</div>
                  <p className="text-slate-600 font-medium">메모를 선택하거나 새로 만들어보세요</p>
                  <p className="text-sm text-slate-400 mt-1">왼쪽 목록에서 메모를 선택하거나 "+ 새 메모"를 눌러주세요.</p>
                </div>
              </section>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
