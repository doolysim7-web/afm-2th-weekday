<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나이 계산기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>나이 계산기</h1>
    <p class="subtitle">생년월일을 입력하면 세 가지 나이를 모두 알려드려요</p>

    <div class="input-group">
      <label>생년월일</label>
      <button id="date-btn" class="date-btn">
        <span id="date-display">날짜를 선택하세요</span>
        <span class="cal-icon">📅</span>
      </button>
    </div>

    <!-- 달력 팝업 -->
    <div class="calendar-popup" id="calendar-popup" hidden>
      <div class="cal-header">
        <button class="nav-btn" id="prev-month">&#8249;</button>
        <div class="cal-title">
          <button class="year-month-btn" id="year-btn"></button>년
          <button class="year-month-btn" id="month-btn"></button>월
        </div>
        <button class="nav-btn" id="next-month">&#8250;</button>
      </div>

      <!-- 연도 선택 패널 -->
      <div class="panel" id="year-panel" hidden>
        <div class="panel-grid" id="year-grid"></div>
      </div>

      <!-- 월 선택 패널 -->
      <div class="panel" id="month-panel" hidden>
        <div class="panel-grid month-grid" id="month-grid"></div>
      </div>

      <!-- 날짜 그리드 -->
      <div id="day-panel">
        <div class="cal-weekdays">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="cal-days" id="cal-days"></div>
      </div>
    </div>

    <button id="calculate-btn">계산하기</button>

    <div class="result" id="result" hidden>
      <div class="age-card main">
        <div class="card-label">만나이 <span class="badge">법적 기준 (2023.6~)</span></div>
        <div class="card-value"><span id="age-man"></span>세</div>
        <div class="card-desc" id="age-man-desc"></div>
      </div>

      <div class="age-card">
        <div class="card-label">연나이 <span class="badge secondary">일부 법령 기준</span></div>
        <div class="card-value"><span id="age-yeon"></span>세</div>
        <div class="card-desc">올해 연도 − 출생 연도</div>
      </div>

      <div class="age-card">
        <div class="card-label">세는나이 <span class="badge secondary">전통 방식</span></div>
        <div class="card-value"><span id="age-se"></span>세</div>
        <div class="card-desc">태어나면 1살, 새해마다 +1</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
