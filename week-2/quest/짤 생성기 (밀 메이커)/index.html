<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>짤 생성기 (밈 메이커)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
    .drop-zone-active { border-color: #6366f1 !important; background-color: rgba(99,102,241,0.08) !important; }
    input[type="range"] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: #e2e8f0; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #6366f1; cursor: pointer; border: 2px solid white; box-shadow: 0 1px 3px rgba(0,0,0,.25); }
    input[type="color"] { -webkit-appearance: none; border: none; cursor: pointer; padding: 0; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
    input[type="color"]::-webkit-color-swatch { border: 1px solid #d1d5db; border-radius: 6px; }
    .settings-scroll::-webkit-scrollbar { width: 5px; }
    .settings-scroll::-webkit-scrollbar-track { background: transparent; }
    .settings-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .settings-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
<div id="root"></div>
<script type="text/babel">
  // ========================================
  // React Hooks Destructuring
  // ========================================
  const { useState, useEffect, useRef, useCallback } = React;

  // ========================================
  // Constants
  // ========================================
  const CW = 600, CH = 500;

  const FONTS = [
    { value: 'Impact',          label: 'Impact' },
    { value: 'Arial',           label: 'Arial' },
    { value: "'Noto Sans KR'",  label: 'Noto Sans KR' },
    { value: "'Comic Sans MS'", label: 'Comic Sans MS' },
  ];

  const BG_SWATCHES = [
    { name: '검정', v: '#000000' }, { name: '흰색', v: '#ffffff' },
    { name: '빨강', v: '#ef4444' }, { name: '주황', v: '#f97316' },
    { name: '노랑', v: '#eab308' }, { name: '초록', v: '#22c55e' },
    { name: '파랑', v: '#3b82f6' }, { name: '보라', v: '#8b5cf6' },
    { name: '핑크', v: '#ec4899' }, { name: '틸',   v: '#14b8a6' },
  ];

  const EMOJI_FALLBACK = '"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif';

  const EMOJI_CATS = [
    { name: '표정',     icon: '😀', list: ['😀','😂','🤣','😍','🥰','😎','🤔','😅','😭','😤','🤯','🥳','😱','😴','🥺','😏','😒','🙄','😬','🤬'] },
    { name: '제스처',   icon: '👍', list: ['👍','👎','👏','🙌','🤝','✌️','🤞','👌','🤙','💪','🤦','🤷','🙏','👋','🫶'] },
    { name: '하트/별',  icon: '❤️', list: ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','💔','❤️‍🔥','💯','✨','🔥','💥','⭐','🌟','💫','🎉','🎊'] },
    { name: '동물',     icon: '🐶', list: ['🐶','🐱','🐭','🐰','🦊','🐻','🐼','🐸','🐯','🦁','🐮','🐷','🐔','🐧','🦄','🐙','🦋','🐠'] },
    { name: '음식',     icon: '🍕', list: ['🍕','🍔','🌮','🍜','🍣','🍦','🎂','🍰','🍩','🍺','🥤','☕','🥐','🍎','🍊','🍋','🍓','🥑'] },
    { name: '기타',     icon: '🚀', list: ['🚀','🎮','💻','📱','🎵','🎤','⚽','🏀','🎯','🏆','💰','💎','🎁','🔑','💡','🌈','🎪','🎭'] },
  ];

  // ========================================
  // Utilities
  // ========================================
  function splitGraphemes(text) {
    try {
      if (Intl.Segmenter) return Array.from(new Intl.Segmenter().segment(text), s => s.segment);
    } catch (_) {}
    return Array.from(text);
  }

  function wrapText(ctx, text, maxW) {
    if (!text) return [];
    const chars = splitGraphemes(text);
    const lines = [];
    let cur = '';
    for (const ch of chars) {
      if (ch === '\n') { lines.push(cur); cur = ''; continue; }
      const test = cur + ch;
      if (ctx.measureText(test).width > maxW && cur.length > 0) { lines.push(cur); cur = ch; }
      else cur = test;
    }
    if (cur) lines.push(cur);
    return lines;
  }

  function makeFont(size, family) {
    return `900 ${size}px ${family}, ${EMOJI_FALLBACK}`;
  }

  let _layerId = 1;
  function mkLayer() {
    return { id: _layerId++, text: '', x: 50, y: 50, fontSize: 32, textColor: '#ffffff', strokeColor: '#000000', strokeWidth: 3 };
  }

  // ========================================
  // 🎨 Design System Components
  // ========================================
  function Btn({ children, onClick, variant = 'primary', size = 'md', disabled, className = '', type = 'button' }) {
    const base = 'font-semibold rounded-lg transition-all inline-flex items-center justify-center gap-1.5 disabled:opacity-40 disabled:cursor-not-allowed cursor-pointer focus:outline-none focus:ring-2 focus:ring-offset-1';
    const v = {
      primary:   'bg-indigo-500 hover:bg-indigo-600 text-white shadow-sm focus:ring-indigo-400',
      secondary: 'bg-gray-200 hover:bg-gray-300 text-gray-700 focus:ring-gray-400',
      success:   'bg-emerald-500 hover:bg-emerald-600 text-white shadow-sm focus:ring-emerald-400',
      danger:    'bg-red-500 hover:bg-red-600 text-white shadow-sm focus:ring-red-400',
      ghost:     'hover:bg-gray-100 text-gray-600 focus:ring-gray-300',
    };
    const s = { sm: 'px-3 py-1.5 text-xs', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };
    return <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${v[variant]} ${s[size]} ${className}`}>{children}</button>;
  }

  function Card({ children, className = '' }) {
    return <div className={`bg-white rounded-xl shadow-sm border border-gray-100 ${className}`}>{children}</div>;
  }

  function Lbl({ children }) {
    return <label className="block text-sm font-medium text-gray-700 mb-1">{children}</label>;
  }

  function SectionHead({ children }) {
    return <p className="text-sm font-bold text-gray-500 uppercase tracking-wide mb-3">{children}</p>;
  }

  function Slider({ label, value, onChange, min, max, step = 1, unit = '' }) {
    return (
      <div>
        <div className="flex justify-between mb-1">
          <span className="text-sm font-medium text-gray-600">{label}</span>
          <span className="text-sm font-mono text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">{value}{unit}</span>
        </div>
        <input type="range" className="w-full" value={value} onChange={e => onChange(+e.target.value)} min={min} max={max} step={step} />
      </div>
    );
  }

  function ColorPick({ label, value, onChange }) {
    return (
      <div className="flex items-center gap-2">
        <span className="text-sm font-medium text-gray-600 flex-1">{label}</span>
        <input type="color" value={value} onChange={e => onChange(e.target.value)} className="w-8 h-8 rounded-lg" />
        <span className="text-xs font-mono text-gray-400 hidden sm:inline">{value}</span>
      </div>
    );
  }

  function FontSelect({ value, onChange }) {
    return (
      <div>
        <Lbl>글꼴</Lbl>
        <select value={value} onChange={e => onChange(e.target.value)}
          className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-400 outline-none bg-white">
          {FONTS.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
        </select>
      </div>
    );
  }

  // ========================================
  // 🎨 Emoji Picker
  // ========================================
  function EmojiPicker({ onSelect }) {
    const [open, setOpen] = useState(false);
    const [tab, setTab] = useState(0);
    const wrapRef = useRef(null);

    useEffect(() => {
      if (!open) return;
      const fn = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
      document.addEventListener('mousedown', fn);
      return () => document.removeEventListener('mousedown', fn);
    }, [open]);

    return (
      <div className="relative flex-shrink-0" ref={wrapRef}>
        <button type="button" onClick={() => setOpen(o => !o)}
          className="w-9 h-9 text-lg rounded-lg border border-gray-200 hover:bg-indigo-50 hover:border-indigo-300 transition-colors flex items-center justify-center"
          title="이모지 추가" aria-label="이모지 추가">😊</button>
        {open && (
          <div className="absolute z-50 bottom-full mb-1 right-0 w-72 bg-white border border-gray-200 rounded-xl shadow-2xl overflow-hidden">
            <div className="flex overflow-x-auto bg-gray-50 border-b border-gray-100">
              {EMOJI_CATS.map((cat, i) => (
                <button key={i} onClick={() => setTab(i)}
                  className={`flex-shrink-0 px-2.5 py-2 text-sm transition-colors ${tab === i ? 'bg-white border-b-2 border-indigo-500 font-medium' : 'hover:bg-white/60 text-gray-500'}`}>
                  {cat.icon} <span className="hidden sm:inline ml-0.5">{cat.name}</span>
                </button>
              ))}
            </div>
            <div className="p-2 grid grid-cols-8 gap-0.5 max-h-44 overflow-y-auto">
              {EMOJI_CATS[tab].list.map((em, i) => (
                <button key={i} onClick={() => { onSelect(em); setOpen(false); }}
                  className="text-xl p-1 rounded hover:bg-indigo-50 transition-colors text-center">{em}</button>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  function EmojiInput({ value, onChange, placeholder, label }) {
    return (
      <div>
        {label && <Lbl>{label}</Lbl>}
        <div className="flex items-center gap-1.5">
          <input type="text" value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
            className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-400 outline-none" />
          <EmojiPicker onSelect={em => onChange(value + em)} />
        </div>
      </div>
    );
  }

  // ========================================
  // 🧩 Background Section
  // ========================================
  function BackgroundSection({ bgType, setBgType, bgColor, setBgColor, onImageUpload, imageName }) {
    const [drag, setDrag] = useState(false);
    const inputRef = useRef(null);

    const read = file => {
      if (!file || !file.type.startsWith('image/')) return;
      const r = new FileReader();
      r.onload = e => onImageUpload(e.target.result, file.name);
      r.readAsDataURL(file);
    };

    return (
      <Card className="p-5">
        <SectionHead>배경</SectionHead>
        <div className="flex gap-2 mb-4">
          <Btn variant={bgType === 'image' ? 'primary' : 'secondary'} size="sm" onClick={() => setBgType('image')}>이미지</Btn>
          <Btn variant={bgType === 'color' ? 'primary' : 'secondary'} size="sm" onClick={() => setBgType('color')}>단색</Btn>
        </div>

        {bgType === 'image' ? (
          <div>
            <div onClick={() => inputRef.current?.click()}
              onDrop={e => { e.preventDefault(); setDrag(false); read(e.dataTransfer.files[0]); }}
              onDragOver={e => { e.preventDefault(); setDrag(true); }}
              onDragLeave={() => setDrag(false)}
              className={`border-2 border-dashed rounded-xl p-6 text-center cursor-pointer transition-all ${drag ? 'drop-zone-active' : 'border-gray-300 hover:border-indigo-400 hover:bg-gray-50'}`}>
              <input ref={inputRef} type="file" accept="image/png,image/jpeg,image/gif,image/webp" className="hidden"
                onChange={e => read(e.target.files[0])} />
              <div className="text-3xl mb-1">🖼️</div>
              <p className="text-sm font-medium text-gray-500">이미지를 드래그하거나 클릭하여 업로드</p>
              <p className="text-xs text-gray-400 mt-1">PNG, JPG, GIF, WebP</p>
            </div>
            {imageName && (
              <p className="text-xs text-indigo-600 mt-2 truncate bg-indigo-50 px-3 py-1.5 rounded-lg">
                <span className="font-medium">업로드됨:</span> {imageName}
              </p>
            )}
          </div>
        ) : (
          <div className="space-y-3">
            <div className="flex items-center gap-3">
              <input type="color" value={bgColor} onChange={e => setBgColor(e.target.value)} className="w-10 h-10 rounded-lg" />
              <span className="text-sm font-mono text-gray-500">{bgColor}</span>
            </div>
            <div className="flex flex-wrap gap-2">
              {BG_SWATCHES.map(s => (
                <button key={s.v} onClick={() => setBgColor(s.v)} title={s.name}
                  className={`w-9 h-9 rounded-lg border-2 transition-all hover:scale-110 ${bgColor === s.v ? 'border-indigo-500 ring-2 ring-indigo-300 scale-110' : 'border-gray-300'}`}
                  style={{ backgroundColor: s.v }} />
              ))}
            </div>
          </div>
        )}
      </Card>
    );
  }

  // ========================================
  // 🧩 Free Text Layer Editor
  // ========================================
  function LayerEditor({ layer, index, onChange, onDelete }) {
    const [open, setOpen] = useState(true);
    const graphemes = layer.text ? splitGraphemes(layer.text) : [];
    const preview = graphemes.length > 0 ? graphemes.slice(0, 6).join('') + (graphemes.length > 6 ? '...' : '') : '(빈 텍스트)';

    const u = (k, v) => onChange({ ...layer, [k]: v });

    return (
      <div className="border border-gray-200 rounded-xl overflow-hidden">
        <div className="flex items-center gap-2 px-3 py-2 bg-gray-50 cursor-pointer" onClick={() => setOpen(o => !o)}>
          <span className="text-indigo-400 text-xs">{open ? '▼' : '▶'}</span>
          <span className="flex-1 text-sm font-medium text-gray-700 truncate">
            <span className="text-gray-400 mr-1">#{index + 1}</span> {preview}
          </span>
          <button onClick={e => { e.stopPropagation(); onDelete(); }}
            className="text-xs text-red-400 hover:text-red-600 px-2 py-1 rounded hover:bg-red-50 transition-colors"
            aria-label="레이어 삭제">삭제</button>
        </div>
        {open && (
          <div className="p-3 space-y-3 bg-white">
            <EmojiInput value={layer.text} onChange={v => u('text', v)} placeholder="표시할 텍스트" />
            <div className="grid grid-cols-2 gap-3">
              <Slider label="X 위치" value={layer.x} onChange={v => u('x', v)} min={0} max={100} unit="%" />
              <Slider label="Y 위치" value={layer.y} onChange={v => u('y', v)} min={0} max={100} unit="%" />
            </div>
            <Slider label="글자 크기" value={layer.fontSize} onChange={v => u('fontSize', v)} min={8} max={120} unit="px" />
            <Slider label="테두리 두께" value={layer.strokeWidth} onChange={v => u('strokeWidth', v)} min={0} max={20} unit="px" />
            <div className="grid grid-cols-2 gap-3">
              <ColorPick label="글자 색" value={layer.textColor} onChange={v => u('textColor', v)} />
              <ColorPick label="테두리 색" value={layer.strokeColor} onChange={v => u('strokeColor', v)} />
            </div>
          </div>
        )}
      </div>
    );
  }

  // ========================================
  // 🚀 App Component
  // ========================================
  function App() {
    const canvasRef = useRef(null);
    const imgRef = useRef(null);
    const drawRef = useRef(null);

    // Background
    const [bgType, setBgType] = useState('image');
    const [imgSrc, setImgSrc] = useState(null);
    const [imgName, setImgName] = useState('');
    const [bgColor, setBgColor] = useState('#000000');

    // Top/Bottom text
    const [topText, setTopText] = useState('');
    const [botText, setBotText] = useState('');

    // Shared text style
    const [fontFam, setFontFam] = useState('Impact');
    const [fontSize, setFontSize] = useState(48);
    const [txColor, setTxColor] = useState('#ffffff');
    const [skColor, setSkColor] = useState('#000000');
    const [skWidth, setSkWidth] = useState(4);

    // Free layers
    const [layers, setLayers] = useState([]);

    // Image upload handler
    const onImageUpload = (src, name) => {
      setImgSrc(src);
      setImgName(name);
      setBgType('image');
    };

    // ── Canvas draw (CRITICAL: imgSrc NOT in deps) ──────────
    const draw = useCallback(() => {
      const canvas = canvasRef.current;
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, CW, CH);

      // Background
      const hasImage = bgType === 'image' && imgRef.current;
      if (hasImage) {
        const img = imgRef.current;
        const scale = Math.min(CW / img.width, CH / img.height);
        const w = img.width * scale, h = img.height * scale;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, CW, CH);
        ctx.drawImage(img, (CW - w) / 2, (CH - h) / 2, w, h);
      } else if (bgType === 'color') {
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, CW, CH);
      } else {
        // Empty placeholder
        ctx.fillStyle = '#f1f5f9';
        ctx.fillRect(0, 0, CW, CH);
        ctx.fillStyle = '#94a3af';
        ctx.font = '15px "Noto Sans KR", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('이미지를 업로드하거나 배경색을 선택하세요', CW / 2, CH / 2);
      }

      const maxW = CW - 40;

      // Helper: draw text lines with stroke+fill
      const drawLines = (lines, cx, startY, baseline, fs, tc, sc, sw, direction) => {
        const lh = fs * 1.2;
        ctx.textAlign = 'center';
        ctx.textBaseline = baseline;
        const drawOneLine = (line, y) => {
          if (sw > 0) {
            ctx.strokeStyle = sc;
            ctx.lineWidth = sw * 2;
            ctx.lineJoin = 'round';
            ctx.strokeText(line, cx, y);
          }
          ctx.fillStyle = tc;
          ctx.fillText(line, cx, y);
        };
        if (direction === 'down') {
          lines.forEach((line, i) => drawOneLine(line, startY + i * lh));
        } else {
          // bottom-up
          for (let i = lines.length - 1; i >= 0; i--) {
            drawOneLine(lines[i], startY - (lines.length - 1 - i) * lh);
          }
        }
      };

      // Top text
      if (topText) {
        ctx.font = makeFont(fontSize, fontFam);
        const lines = wrapText(ctx, topText, maxW);
        drawLines(lines, CW / 2, 20, 'top', fontSize, txColor, skColor, skWidth, 'down');
      }

      // Bottom text
      if (botText) {
        ctx.font = makeFont(fontSize, fontFam);
        const lines = wrapText(ctx, botText, maxW);
        drawLines(lines, CW / 2, CH - 20, 'bottom', fontSize, txColor, skColor, skWidth, 'up');
      }

      // Free layers
      layers.forEach(l => {
        if (!l.text) return;
        const cx = (l.x / 100) * CW;
        const cy = (l.y / 100) * CH;
        ctx.font = makeFont(l.fontSize, fontFam);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const lines = wrapText(ctx, l.text, maxW);
        const lh = l.fontSize * 1.2;
        const totalH = lines.length * lh;
        lines.forEach((line, i) => {
          const ly = cy - totalH / 2 + i * lh + lh / 2;
          if (l.strokeWidth > 0) {
            ctx.strokeStyle = l.strokeColor;
            ctx.lineWidth = l.strokeWidth * 2;
            ctx.lineJoin = 'round';
            ctx.strokeText(line, cx, ly);
          }
          ctx.fillStyle = l.textColor;
          ctx.fillText(line, cx, ly);
        });
      });
    }, [bgType, bgColor, topText, botText, fontSize, txColor, skColor, skWidth, fontFam, layers]);

    // Keep drawRef always pointing to latest draw
    useEffect(() => { drawRef.current = draw; });

    // Load image into imgRef (async) -- calls drawRef.current() on load
    useEffect(() => {
      if (!imgSrc) { imgRef.current = null; drawRef.current?.(); return; }
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => { imgRef.current = img; drawRef.current?.(); };
      img.onerror = () => { imgRef.current = null; drawRef.current?.(); };
      img.src = imgSrc;
    }, [imgSrc]);

    // Redraw when any draw dependency changes
    useEffect(() => { draw(); }, [draw]);

    // Layer CRUD
    const addLayer = () => setLayers(p => [...p, mkLayer()]);
    const updLayer = updated => setLayers(p => p.map(l => l.id === updated.id ? updated : l));
    const delLayer = id => setLayers(p => p.filter(l => l.id !== id));

    // Download
    const download = fmt => {
      const c = canvasRef.current;
      if (!c) return;
      const a = document.createElement('a');
      a.download = `meme_${Date.now()}.${fmt}`;
      a.href = fmt === 'png' ? c.toDataURL('image/png') : c.toDataURL('image/jpeg', 0.95);
      a.click();
    };

    return (
      <div className="min-h-screen bg-gradient-to-br from-gray-50 via-white to-indigo-50/40">
        {/* Header */}
        <header className="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-40">
          <div className="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
            <div className="w-9 h-9 bg-indigo-500 rounded-xl flex items-center justify-center text-white text-lg font-black shadow-sm">M</div>
            <div>
              <h1 className="text-lg font-bold text-gray-800 leading-tight">짤 생성기</h1>
              <p className="text-[11px] text-gray-400">밈 메이커 &middot; 이모지 지원</p>
            </div>
          </div>
        </header>

        <main className="max-w-7xl mx-auto px-4 py-6">
          <div className="flex flex-col lg:flex-row gap-6">

            {/* Left: Canvas + Download */}
            <div className="flex-shrink-0">
              <Card className="p-4">
                <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">미리보기</p>
                <canvas ref={canvasRef} width={CW} height={CH}
                  className="rounded-lg border border-gray-200 max-w-full h-auto block bg-gray-50" />
                <div className="flex gap-2 mt-4">
                  <Btn variant="primary" className="flex-1" onClick={() => download('png')}>
                    <span>PNG 다운로드</span>
                  </Btn>
                  <Btn variant="success" className="flex-1" onClick={() => download('jpg')}>
                    <span>JPG 다운로드</span>
                  </Btn>
                </div>
              </Card>
            </div>

            {/* Right: Settings (scrollable) */}
            <div className="flex-1 min-w-0 lg:max-h-[calc(100vh-100px)] lg:overflow-y-auto settings-scroll">
              <div className="space-y-4">

                {/* 1. Background */}
                <BackgroundSection
                  bgType={bgType} setBgType={setBgType}
                  bgColor={bgColor} setBgColor={setBgColor}
                  onImageUpload={onImageUpload} imageName={imgName}
                />

                {/* 2. Top/Bottom Text */}
                <Card className="p-5">
                  <SectionHead>상단 / 하단 텍스트</SectionHead>
                  <div className="space-y-3">
                    <EmojiInput label="상단 텍스트" value={topText} onChange={setTopText} placeholder="상단에 표시할 텍스트" />
                    <EmojiInput label="하단 텍스트" value={botText} onChange={setBotText} placeholder="하단에 표시할 텍스트" />
                  </div>
                </Card>

                {/* 3. Shared Text Style */}
                <Card className="p-5">
                  <SectionHead>텍스트 스타일 (공통)</SectionHead>
                  <div className="space-y-4">
                    <FontSelect value={fontFam} onChange={setFontFam} />
                    <Slider label="글자 크기" value={fontSize} onChange={setFontSize} min={12} max={120} unit="px" />
                    <div className="grid grid-cols-2 gap-4">
                      <ColorPick label="글자 색" value={txColor} onChange={setTxColor} />
                      <ColorPick label="테두리 색" value={skColor} onChange={setSkColor} />
                    </div>
                    <Slider label="테두리 두께" value={skWidth} onChange={setSkWidth} min={0} max={20} unit="px" />
                  </div>
                </Card>

                {/* 4. Free Text Layers */}
                <Card className="p-5">
                  <div className="flex items-center justify-between mb-3">
                    <SectionHead>자유 위치 텍스트</SectionHead>
                  </div>
                  {layers.length === 0 && (
                    <p className="text-sm text-gray-400 text-center py-4">아래 버튼으로 텍스트 레이어를 추가하세요</p>
                  )}
                  <div className="space-y-3">
                    {layers.map((l, i) => (
                      <LayerEditor key={l.id} layer={l} index={i}
                        onChange={updLayer} onDelete={() => delLayer(l.id)} />
                    ))}
                  </div>
                  <Btn variant="secondary" size="md" className="w-full mt-3" onClick={addLayer}>
                    + 텍스트 추가
                  </Btn>
                </Card>

              </div>
            </div>

          </div>
        </main>
      </div>
    );
  }

  // ========================================
  // Rendering
  // ========================================
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
